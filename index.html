<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Префлоп‑тренажёр v4</title>
    <style>
        :root {
            --bg: #1a1d23; --panel-bg: #21252b; --text: #d4d4d4; --accent: #6366f1;
            --accent-hover: #818cf8; --danger: #ef4444; --success: #22c55e; --warning: #fbbf24;
            --cell-bg: #2a2d35; --fold-color: #5a5f6b; --border: #3a3f4b; --radius: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; user-select: none;
        }
        #left-panel {
            width: 360px; min-width: 360px; background: var(--panel-bg); display: flex;
            flex-direction: column; border-right: 1px solid var(--border); overflow-y: auto;
            overflow-x: hidden; padding: 12px; gap: 8px; scrollbar-width: thin; scrollbar-color: #4a4f5a #2a2d35;
        }
        #left-panel::-webkit-scrollbar { width: 6px; }
        #left-panel::-webkit-scrollbar-track { background: #2a2d35; }
        #left-panel::-webkit-scrollbar-thumb { background: #4a4f5a; border-radius: 3px; }
        #right-panel {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px;
        }
        #grid-wrapper { display: flex; align-items: center; justify-content: center; transition: opacity 0.25s; }
        #grid-wrapper.invisible { opacity: 0; pointer-events: none; }
        #grid-main {
            display: flex; flex-direction: column; gap: 1px; background: #0003; border-radius: var(--radius); padding: 2px;
        }
        .grid-row-cells { display: flex; gap: 1px; }
        .cell {
            width: clamp(44px, 5.5vw, 60px); height: clamp(44px, 5.5vw, 60px);
            background: var(--cell-bg); position: relative; cursor: pointer; border: 2px solid transparent;
            border-radius: 2px; transition: border-color 0.1s; display: flex; align-items: center; justify-content: center;
        }
        .cell.train-marked { border-color: #c084fc; box-shadow: inset 0 0 0 1px #c084fc; }
        .cell.active-train-hand { border-color: var(--warning); animation: activeGlow 1.2s infinite; }
        .cell.memory-correct { border-color: var(--success); }
        .cell.memory-wrong { border-color: var(--danger); }
        @keyframes activeGlow { 0%,100%{ box-shadow: 0 0 6px var(--warning); } 50%{ box-shadow: 0 0 12px var(--warning); } }
        .cell-label {
            font-size: 2.2rem;
            font-weight: 900;
            color: #000;
            text-shadow: 1px 1px 3px rgba(255,255,255,0.4), -1px -1px 3px rgba(255,255,255,0.4);
            pointer-events: none;
            z-index: 2;
            text-align: center;
            line-height: 1.2;
        }
        .cell-label.pair {
            color: #fff;
            text-shadow: 1px 1px 3px #000, -1px -1px 3px #000;
        }
        .stripe { position: absolute; left: 0; right: 0; z-index: 1; }
        .badge {
            position: absolute; top: 2px; left: 2px; background: #000a; color: #fff;
            font-size: 0.65rem; padding: 1px 4px; border-radius: 10px; z-index: 3;
        }
        .badge.error { background: var(--danger); }
        .badge.success { background: var(--success); }
        .brush-chip {
            display: inline-flex; align-items: center; gap: 6px; background: #2a2d35;
            padding: 4px 10px; border-radius: 16px; cursor: pointer; border: 2px solid transparent;
            margin: 3px; font-size: 0.9rem; user-select: none;
        }
        .brush-chip.selected { border-color: var(--accent); }
        .brush-chip.dragging { opacity: 0.5; }
        .swatch { width: 14px; height: 14px; border-radius: 4px; display: inline-block; }
        .del-brush { margin-left: 4px; color: var(--danger); cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        .tree-item {
            display: flex; align-items: center; gap: 4px; padding: 4px 6px; border-radius: 4px;
            cursor: pointer; transition: background 0.1s; position: relative;
        }
        .tree-item:hover { background: #2a2d35; }
        .tree-item.active-tree { background: var(--accent); color: #fff; }
        .tree-actions { display: none; margin-left: auto; }
        .tree-item:hover .tree-actions { display: flex; gap: 4px; }
        button {
            background: var(--accent); color: #fff; border: none; padding: 6px 12px;
            border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: background 0.15s;
        }
        button:hover { background: var(--accent-hover); }
        button.danger { background: var(--danger); }
        button.danger:hover { background: #dc2626; }
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: #000a;
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content {
            background: var(--panel-bg); padding: 20px; border-radius: 12px; min-width: 300px;
            display: flex; flex-direction: column; gap: 12px;
        }
        input, select {
            background: #2a2d35; border: 1px solid var(--border); color: var(--text);
            padding: 6px; border-radius: 4px;
        }
        .flex-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        #poker-table {
            width: 280px; height: 280px; border-radius: 50%; background: #1e4d2b;
            border: 4px solid #2d6a3a; position: relative; margin: 10px auto;
        }
        .seat {
            position: absolute; width: 44px; height: 44px; background: #2a2d35; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 0.8rem;
            font-weight: bold; color: #fff; border: 2px solid #a0a0a0; box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }
        .table-center-hand {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -60%);
            font-size: 2.2rem; font-weight: 900; color: #fff; text-shadow: 0 0 10px #000; z-index: 5;
        }
        .table-center-stack {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, 20px);
            font-size: 1rem; font-weight: bold; color: #ccc; background: #00000080;
            padding: 2px 10px; border-radius: 10px; z-index: 5;
        }
        .mixture-btn {
            display: inline-flex; height: 38px; border-radius: 6px; overflow: hidden;
            margin: 4px; cursor: pointer; border: 2px solid transparent; position: relative;
        }
        .mixture-stripe { height: 100%; }
        .mixture-label {
            position: absolute; inset: 0; display: flex; align-items: center;
            justify-content: center; font-weight: bold; font-size: 0.8rem;
            color: #fff; text-shadow: 0 0 4px #000;
        }
    </style>
</head>
<body>
<div id="left-panel">
    <div id="mode-tabs" class="flex-row">
        <button data-mode="editor">✏️ Редактор</button>
        <button data-mode="selection">🎯 Выборка</button>
        <button data-mode="train">🏋️ Тренировка</button>
        <button data-mode="memory">🧠 Память</button>
        <button data-mode="report">📊 Отчёт</button>
    </div>
    <div id="section-editor-brushes">
        <div class="flex-row"><span>Кисти:</span><button id="btn-add-brush">+ Кисть</button></div>
        <div id="brush-list" class="flex-row"></div>
        <div id="add-brush-form" style="display:none; gap:4px; flex-direction:column;">
            <select id="brush-type-select"><option>РЕЙЗ</option><option>КОЛЛ</option><option>ФОЛД</option><option>АЛЛ-ИН</option><option>ЧЕК</option></select>
            <input id="brush-name-input" placeholder="Название"><div id="color-palette" class="flex-row"></div>
            <input type="color" id="brush-color-input" value="#6366f1">
            <div class="flex-row"><button id="save-brush">Сохранить</button><button id="cancel-brush">Отмена</button></div>
        </div>
    </div>
    <div id="section-editor-tree">
        <div class="flex-row"><button id="btn-add-folder">📁 Папка</button><button id="btn-add-range">📄 Диапазон</button></div>
        <div id="tree-container"></div>
    </div>
    <div id="section-selection" style="display:none;">
        <div id="selection-model-tree-container" style="margin-top:4px;"></div>
        <div class="flex-row"><button id="btn-add-selection-folder">📁 Папка</button><button id="btn-add-selection-model">+ Модель</button></div>
        <div id="selection-range-tree-container" style="margin-top:8px;"></div>
    </div>
    <div id="section-train" style="display:none; flex-direction:column; gap:8px;">
        <div id="train-source-name"></div>
        <div id="poker-table"><div class="table-center-hand" id="train-hand-center"></div><div class="table-center-stack" id="train-stack-center"></div></div>
        <div id="train-score" style="text-align:center; font-weight:bold;"></div>
        <div id="train-answer-buttons" class="flex-row"></div>
        <div id="train-feedback" style="text-align:center; font-weight:bold;"></div>
        <button id="btn-toggle-grid-train">👁️ Сетка</button>
    </div>
    <div id="section-memory" style="display:none; flex-direction:column; gap:8px;">
        <div id="memory-tree-container"></div>
        <div id="memory-brush-buttons" class="flex-row"></div>
        <button id="btn-check-memory">✅ Проверить</button>
        <button id="btn-toggle-grid-memory">👁️ Сетка</button>
    </div>
    <div id="section-report" style="display:none; flex-direction:column; gap:8px;">
        <select id="report-mode-select"><option value="train">Тренировка</option><option value="memory">Память</option></select>
        <select id="report-model-select"><option value="__all__">Все модели</option></select>
        <div id="report-tree-container"></div>
        <div id="report-accuracy"></div>
        <div id="report-details"></div>
        <div id="report-models-list" style="margin-top:8px;"></div>
        <button id="btn-reset-stats" class="danger">🗑️ Сброс статистики</button>
    </div>
    <div class="flex-row" style="margin-top:auto;">
        <button id="btn-export">📥 Экспорт</button>
        <button id="btn-import">📤 Импорт</button>
        <button id="btn-refresh-charts">🔄 Обновить чарты</button>
        <span id="timer-display">00:00</span>
        <button id="btn-reset-timer">🕒 Сброс</button>
    </div>
    <input type="file" id="import-file-input" accept=".json" style="display:none;">
</div>
<div id="right-panel"><div id="grid-wrapper"><div id="grid-main"></div></div></div>
<div id="scenario-modal" class="modal-overlay" style="display:none;"><div class="modal-content">
    <h3>Сценарий раздачи</h3>
    <label>Поз:<select id="scenario-position"><option>BTN</option><option>SB</option><option>BB</option><option>UTG</option><option>MP</option><option>CO</option></select></label>
    <label>Игр:<input id="scenario-players" type="number" min="2" max="9" value="6"></label>
    <label>Стек:<input id="scenario-stack" type="number" value="100"></label>
    <label>До:<select id="scenario-action"><option value="none">Нет</option><option value="limp">Лимп</option><option value="raise">Рейз</option><option value="3bet">3-бет</option><option value="allin">Алл-ин</option></select></label>
    <div id="scenario-raise-size-container"><label>Размер:<input id="scenario-raise-size" type="number" step="0.1" value="2.5"></label></div>
    <div class="flex-row"><button id="save-scenario">Сохранить</button><button id="cancel-scenario">Отмена</button></div>
</div></div>
<div id="confirm-modal" class="modal-overlay" style="display:none;"><div class="modal-content">
    <p id="confirm-message"></p><div class="flex-row"><button id="confirm-no">Нет</button><button id="confirm-yes" class="danger">Да</button></div>
</div></div>
<script>
    (function() {
        const BUILTIN_FOLD_ID = 'builtin-fold';
        const DEFAULT_FOLD_COLOR = '#5a5f6b';
        const POPULAR_COLORS = ['#ef4444','#f97316','#eab308','#22c55e','#14b8a6','#3b82f6','#6366f1','#a855f7','#ec4899','#78716c','#84cc16','#06b6d4'];
        const RANKS = ['A','K','Q','J','T','9','8','7','6','5','4','3','2'];

        const state = {
            mode: 'editor', brushes: [], tree: [], activeRangeId: null, activeTreeElementId: null,
            selectedBrushes: new Set(), trainCounts: { correct: 0, wrong: 0 },
            memoryCounts: { correct: 0, wrong: 0 }, isDrawing: false, isShiftDrawing: false,
            trainState: { currentHand: null, currentRangeId: null, answered: false, feedback: '', showGrid: true, timeoutId: null },
            memoryState: { userChart: {}, checked: false, selectedMemBrushId: BUILTIN_FOLD_ID, showGrid: true },
            statistics: { train: [], memory: [] }, timerInterval: null, timerMode: null, timerStart: 0,
            reportSelectedId: '__all__', reportExpandedFolders: new Set(), reportSelectedModelId: '__all__',
            selectionTree: [], activeSelectionModelId: null, selectionExpandedFolders: new Set()
        };
        const cellElements = new Map();

        function genId() { return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8); }
        function getHandName(row, col) {
            if (row === col) return RANKS[row] + RANKS[col];
            if (row < col) return RANKS[row] + RANKS[col] + 's';
            return RANKS[col] + RANKS[row] + 'o';
        }
        function getHandDisplayName(hand, row, col) {
            if (row === col) return RANKS[row];
            if (row < col) return RANKS[row] + RANKS[col];
            return RANKS[col] + RANKS[row];
        }
        function getAllHands() { const hands = []; for (let r=0; r<13; r++) for (let c=0; c<13; c++) hands.push(getHandName(r,c)); return hands; }

        function saveData() {
            localStorage.setItem('preflop_trainer_v4', JSON.stringify({
                version: 4, brushes: state.brushes, tree: state.tree, statistics: state.statistics,
                trainCounts: state.trainCounts, memoryCounts: state.memoryCounts,
                selectionTree: state.selectionTree, activeSelectionModelId: state.activeSelectionModelId
            }));
        }
        function loadData() {
            const raw = localStorage.getItem('preflop_trainer_v4'); if (!raw) return false;
            try {
                const data = JSON.parse(raw); if (data.version !== 4) return false;
                state.brushes = data.brushes || []; state.tree = data.tree || [];
                state.statistics = data.statistics || { train: [], memory: [] };
                state.trainCounts = data.trainCounts || { correct:0, wrong:0 };
                state.memoryCounts = data.memoryCounts || { correct:0, wrong:0 };
                if (data.selectionTree) state.selectionTree = data.selectionTree;
                else if (data.selectionModels) state.selectionTree = data.selectionModels.map(m => ({ id: m.id, type: 'model', name: m.name, marks: m.marks || {} }));
                else state.selectionTree = [];
                state.activeSelectionModelId = data.activeSelectionModelId || null;
                state.selectedBrushes = new Set([BUILTIN_FOLD_ID]); state.selectionExpandedFolders = new Set();
                return true;
            } catch { return false; }
        }
        function ensureBuiltinFold() {
            if (!state.brushes.find(b => b.id === BUILTIN_FOLD_ID)) state.brushes.unshift({ id: BUILTIN_FOLD_ID, type: 'ФОЛД', name: 'ФОЛД', color: DEFAULT_FOLD_COLOR, builtin: true });
            if (state.selectedBrushes.size === 0) state.selectedBrushes.add(BUILTIN_FOLD_ID);
        }
        function getBrushById(id) { return state.brushes.find(b => b.id === id); }
        function findItemInTreeById(tree, id) {
            for (const item of tree) { if (item.id === id) return item; if (item.type === 'folder') { const f = findItemInTreeById(item.children, id); if (f) return f; } }
            return null;
        }
        function findParentArray(tree, id) {
            for (const item of tree) { if (item.id === id) return tree; if (item.type === 'folder') { const p = findParentArray(item.children, id); if (p) return p; } }
            return null;
        }
        function isDescendant(tree, parentId, childId) {
            if (parentId === childId) return true;
            const parent = findItemInTreeById(tree, parentId); if (!parent || parent.type !== 'folder') return false;
            return !!findItemInTreeById(parent.children, childId);
        }
        function removeItemFromTree(tree, id) {
            for (let i=0; i<tree.length; i++) { if (tree[i].id === id) return tree.splice(i,1)[0]; if (tree[i].type === 'folder') { const r = removeItemFromTree(tree[i].children, id); if (r) return r; } }
            return null;
        }
        function insertAfterInTree(tree, targetId, item) {
            for (let i=0; i<tree.length; i++) { if (tree[i].id === targetId) { tree.splice(i+1,0,item); return true; } if (tree[i].type === 'folder' && insertAfterInTree(tree[i].children, targetId, item)) return true; }
            return false;
        }
        function getAllModelsFromTree(tree) { return tree.flatMap(item => item.type === 'model' ? [item] : (item.type === 'folder' ? getAllModelsFromTree(item.children) : [])); }
        function getAllRangesFromTree(tree) { return tree.flatMap(item => item.type === 'range' ? [item] : (item.type === 'folder' ? getAllRangesFromTree(item.children) : [])); }
        function getActiveRange() { return state.activeRangeId ? findItemInTreeById(state.tree, state.activeRangeId) : null; }
        function normalizeChartEntry(entries) {
            if (!entries || entries.length === 0) return [];
            let filtered = entries.filter(e => e.pct > 0); let sum = filtered.reduce((s,e) => s + e.pct, 0);
            if (sum > 100) filtered = filtered.map(e => ({...e, pct: Math.round((e.pct/sum)*100)}));
            sum = filtered.reduce((s,e) => s + e.pct, 0);
            if (sum < 100 && filtered.length > 0) filtered.push({ brushId: BUILTIN_FOLD_ID, pct: 100 - sum });
            return filtered;
        }
        function getDominantBrushId(chart, hand) {
            const entry = chart[hand]; if (!entry || entry.length === 0) return BUILTIN_FOLD_ID;
            const norm = normalizeChartEntry(entry); if (norm.length === 0) return BUILTIN_FOLD_ID;
            return norm.reduce((a,b) => a.pct > b.pct ? a : b).brushId;
        }
        function getBrushIdsFromRange(range) {
            // Возвращает Set в порядке следования кистей в state.brushes
            const set = new Set();
            if (range.chart) {
                // Собираем все brushId, используемые в чарте
                const used = new Set();
                Object.values(range.chart).forEach(arr => arr.forEach(e => used.add(e.brushId)));
                // Добавляем в порядке state.brushes
                state.brushes.forEach(b => { if (used.has(b.id)) set.add(b.id); });
            }
            // Если нет ни одной кисти, добавляем фолд
            if (set.size === 0) set.add(BUILTIN_FOLD_ID);
            return set;
        }
        function getMixedPatternsFromRange(range) {
            const map = new Map(); if (!range.chart) return [];
            for (const [hand, entries] of Object.entries(range.chart)) {
                const norm = normalizeChartEntry(entries); if (norm.length <= 1) continue;
                const key = norm.map(e => `${e.brushId}:${e.pct}`).join(',');
                if (!map.has(key)) map.set(key, { entries: norm, key });
            }
            return Array.from(map.values());
        }

        function buildGrid() {
            const grid = document.getElementById('grid-main'); grid.innerHTML = ''; cellElements.clear();
            for (let r=0; r<13; r++) {
                const rowDiv = document.createElement('div'); rowDiv.className = 'grid-row-cells';
                for (let c=0; c<13; c++) {
                    const hand = getHandName(r,c);
                    const cell = document.createElement('div'); cell.className = 'cell';
                    cell.dataset.hand = hand; cell.dataset.row = r; cell.dataset.col = c;
                    const label = document.createElement('div');
                    label.className = 'cell-label';
                    label.textContent = getHandDisplayName(hand, r, c);
                    if (r === c) label.classList.add('pair');
                    cell.appendChild(label);
                    cell.addEventListener('mousedown', onCellMouseDown);
                    cell.addEventListener('mouseenter', onCellMouseEnter);
                    rowDiv.appendChild(cell);
                    cellElements.set(hand, cell);
                }
                grid.appendChild(rowDiv);
            }
        }
        function updateCellDisplay(cell, hand, chart, train, hideTrainMarks) {
            cell.querySelectorAll('.stripe,.badge').forEach(el => el.remove());
            let label = cell.querySelector('.cell-label');
            if (!label) {
                label = document.createElement('div');
                label.className = 'cell-label';
                const row = +cell.dataset.row;
                const col = +cell.dataset.col;
                label.textContent = getHandDisplayName(hand, row, col);
                if (row === col) label.classList.add('pair');
                cell.appendChild(label);
            }
            if (!hideTrainMarks) cell.classList.toggle('train-marked', train && train[hand] === true);
            const norm = chart?.[hand] ? normalizeChartEntry(chart[hand]) : [];
            if (norm.length === 0) {
                const stripe = document.createElement('div'); stripe.className = 'stripe';
                stripe.style.top = '0'; stripe.style.height = '100%'; stripe.style.background = DEFAULT_FOLD_COLOR; cell.appendChild(stripe);
            } else {
                let top = 0;
                norm.forEach(e => {
                    const stripe = document.createElement('div'); stripe.className = 'stripe';
                    stripe.style.top = top + '%'; stripe.style.height = e.pct + '%';
                    stripe.style.background = getBrushById(e.brushId)?.color || DEFAULT_FOLD_COLOR; cell.appendChild(stripe); top += e.pct;
                });
            }
            if (label) cell.appendChild(label);
        }
        function updateCellsForRange(rangeId, hideTrainMarks = false) {
            const range = rangeId ? findItemInTreeById(state.tree, rangeId) : null;
            const chart = range?.chart || {}; const train = range?.train || {};
            cellElements.forEach((cell, hand) => updateCellDisplay(cell, hand, chart, train, hideTrainMarks));
        }

        function onCellMouseDown(e) {
            const hand = e.currentTarget.dataset.hand;
            if (state.mode === 'train' && e.shiftKey) { toggleTrainMark(hand); return; }
            if (state.mode === 'selection' && e.shiftKey) { state.isDrawing = true; state.isShiftDrawing = true; toggleSelectionMark(hand); return; }
            if (state.mode === 'memory') { state.isDrawing = true; state.isShiftDrawing = false; applyMemoryBrush(hand); return; }
            if (state.mode === 'editor' && !e.shiftKey) { state.isDrawing = true; state.isShiftDrawing = false; applyBrushReplace(hand); return; }
        }
        function onCellMouseEnter(e) {
            if (!state.isDrawing) return;
            const hand = e.currentTarget.dataset.hand;
            if (state.mode === 'editor') applyBrushReplace(hand);
            else if (state.mode === 'selection' && state.isShiftDrawing) toggleSelectionMark(hand);
            else if (state.mode === 'memory') applyMemoryBrush(hand);
        }
        document.addEventListener('mouseup', () => { state.isDrawing = false; state.isShiftDrawing = false; });

        function toggleTrainMark(hand) { const r = getActiveRange(); if (r) { r.train = r.train || {}; r.train[hand] = !r.train[hand]; saveData(); updateCellDisplay(cellElements.get(hand), hand, r.chart, r.train, false); } }
        function toggleSelectionMark(hand) {
            const range = getActiveRange(); if (!range) return;
            const model = findItemInTreeById(state.selectionTree, state.activeSelectionModelId);
            if (!model || model.type !== 'model') return;
            model.marks = model.marks || {}; model.marks[range.id] = model.marks[range.id] || {};
            model.marks[range.id][hand] = !model.marks[range.id][hand];
            saveData(); updateSelectionGrid(); renderSelectionRangeTree();
        }

                const chip = document.createElement('span'); chip.className = 'brush-chip';

                chip.innerHTML = `<span class="swatch" style="background:${brush.color};"></span>${brush.name}`;

                });

                chip.addEventListener('dragover', (e) => e.preventDefault());
                chip.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const draggedId = e.dataTransfer.getData('text/plain');
                    if (draggedId === brush.id) return;
                    const draggedIdx = state.brushes.findIndex(b => b.id === draggedId);
                    if (draggedIdx !== -1) {
                        const [moved] = state.brushes.splice(draggedIdx, 1);
                        state.brushes.splice(idx, 0, moved);
                        saveData(); renderBrushes();
                    }
                });
                chip.onclick = (e) => {
                    if (e.ctrlKey || e.metaKey) {
                        state.selectedBrushes.has(brush.id) ? state.selectedBrushes.delete(brush.id) : state.selectedBrushes.add(brush.id);
                    } else {
                        state.selectedBrushes.clear(); state.selectedBrushes.add(brush.id);

                };

        function renderTreeItems(items, container, depth, isEditor, selectionModel = null) {

                    div.appendChild(actions);

                    if (selectionModel) {
                        if (item.type === 'range') { state.activeRangeId = item.id; updateSelectionGrid(); renderSelectionRangeTree(); }
                        else if (item.type === 'folder') { state.selectionExpandedFolders.has(item.id) ? state.selectionExpandedFolders.delete(item.id) : state.selectionExpandedFolders.add(item.id); renderSelectionRangeTree(); return; }
                    } else {
                        if (isEditor) state.activeTreeElementId = item.id;

                            state.activeRangeId = item.id;
                            if (state.mode === 'editor') updateCellsForRange(item.id, true);
                            else if (state.mode === 'memory') { state.memoryState.userChart = {}; state.memoryState.checked = false; updateMemoryBrushButtons(item); setAllCellsNeutral(); }
                        } else if (item.type === 'folder') { item.expanded = !item.expanded; saveData(); if (state.mode==='memory') renderMemoryTree(); else renderTree(); return; }
                        if (state.mode==='memory') renderMemoryTree(); else if (state.mode==='editor') renderTree();

                div.ondblclick = (e) => { if(isEditor && !selectionModel) startRename(item); };
                if (isEditor && !selectionModel) {
                    div.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', JSON.stringify({id:item.id})); });
                    div.addEventListener('dragover', (e) => { e.preventDefault(); const rect = div.getBoundingClientRect(); const y = e.clientY - rect.top; div.dataset.dropPosition = y < rect.height*0.25 ? 'before' : (y > rect.height*0.75 ? 'after' : 'inside'); });
                    div.addEventListener('dragleave', () => { div.dataset.dropPosition = ''; });

                }

            const copy = JSON.parse(JSON.stringify(model)); copy.id = genId(); copy.name += ' (копия)';
            insertAfterInTree(state.selectionTree, id, copy); state.activeSelectionModelId = copy.id;
            saveData(); renderSelectionModelTree(); renderSelectionRangeTree(); updateSelectionGrid();
        }
        async function deleteSelectionItem(id) {
            if (!await customConfirm('Удалить?')) return;
            removeItemFromTree(state.selectionTree, id); if (state.activeSelectionModelId === id) state.activeSelectionModelId = null;
            saveData(); renderSelectionModelTree(); renderSelectionRangeTree(); updateSelectionGrid();
        }
        document.getElementById('btn-add-selection-folder').onclick = () => { const folder = { id: genId(), type: 'folder', name: 'Новая папка', expanded: true, children: [] }; state.selectionTree.push(folder); state.selectionExpandedFolders.add(folder.id); saveData(); renderSelectionModelTree(); };
        document.getElementById('btn-add-selection-model').onclick = () => { const model = { id: genId(), type: 'model', name: `Модель ${getAllModelsFromTree(state.selectionTree).length+1}`, marks: {} }; state.selectionTree.push(model); state.activeSelectionModelId = model.id; saveData(); renderSelectionModelTree(); renderSelectionRangeTree(); updateSelectionGrid(); };

        function getAllTrainHandsWithRange() {
            const ranges = getAllRangesFromTree(state.tree);
            const model = findItemInTreeById(state.selectionTree, state.activeSelectionModelId);
            if (model && model.type === 'model') {
                const hands = [];
                ranges.forEach(range => { const marks = model.marks?.[range.id] || {}; Object.keys(marks).filter(h => marks[h]).forEach(h => hands.push({hand:h, rangeId:range.id, scenario:range.scenario})); });
                return hands;
            } else {
                const hands = [];
                ranges.forEach(range => { if (range.train) Object.keys(range.train).filter(h => range.train[h]).forEach(h => hands.push({hand:h, rangeId:range.id, scenario:range.scenario})); });
                return hands;
            }
        }
        function updateTrainScore() { document.getElementById('train-score').textContent = `✅ ${state.trainCounts.correct} / ❌ ${state.trainCounts.wrong}`; }
        function startTraining() {
            clearTimeout(state.trainState.timeoutId);
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('train-marked'));
            state.trainState.answered = false; state.trainState.feedback = '';
            const handsList = getAllTrainHandsWithRange();
            if (handsList.length === 0) { document.getElementById('train-feedback').textContent = 'Нет отмеченных рук'; return; }
            const pick = handsList[Math.floor(Math.random() * handsList.length)];
            state.trainState.currentHand = pick.hand; state.trainState.currentRangeId = pick.rangeId;
            const range = findItemInTreeById(state.tree, pick.rangeId);
            document.getElementById('train-source-name').textContent = range?.name || '';
            document.getElementById('train-hand-center').textContent = pick.hand;
            document.getElementById('train-stack-center').textContent = pick.scenario?.effectiveStack ? `Стек: ${pick.scenario.effectiveStack}bb` : '';
            updatePokerTable(pick.scenario);
            if (state.trainState.showGrid) { document.getElementById('grid-wrapper').classList.remove('invisible'); updateCellsForRange(pick.rangeId, true); highlightCellInTrain(pick.hand); }
            else { document.getElementById('grid-wrapper').classList.add('invisible'); }
            renderTrainAnswerButtons(pick.rangeId);
            document.getElementById('train-feedback').textContent = '';
            updateTrainScore();
        }
        function renderTrainAnswerButtons(rangeId) {
            const container = document.getElementById('train-answer-buttons');
            container.innerHTML = '';
            const range = findItemInTreeById(state.tree, rangeId);
            if (!range) return;
            // Получаем ID кистей, используемых в диапазоне
            const usedIds = getBrushIdsFromRange(range);
            // Сортируем в порядке state.brushes
            const sortedBrushes = state.brushes.filter(b => usedIds.has(b.id));
            sortedBrushes.forEach(brush => {
                const btn = document.createElement('button');
                btn.style.background = brush.color;
                btn.textContent = brush.name;
                btn.onclick = () => handleTrainingAnswer(brush.id);
                container.appendChild(btn);
            });
            // Смешанные кнопки (если есть) добавляем после
            const mixtures = getMixedPatternsFromRange(range);
            mixtures.forEach((mix, idx) => {
                const btn = document.createElement('div'); btn.className = 'mixture-btn'; btn.style.width = '100px';
                mix.entries.forEach(e => { const s = document.createElement('div'); s.className = 'mixture-stripe'; s.style.width = e.pct+'%'; s.style.background = getBrushById(e.brushId)?.color || DEFAULT_FOLD_COLOR; btn.appendChild(s); });
                const label = document.createElement('div'); label.className = 'mixture-label'; label.textContent = mix.entries.map(e => getBrushById(e.brushId)?.name).join('/');
                btn.appendChild(label); btn.dataset.patternKey = mix.key;
                btn.onclick = () => handleTrainingAnswer('mixture_'+idx, mix.key);
                container.appendChild(btn);
            });
        }
        function handleTrainingAnswer(answerBrushId, patternKey = null) {
            if (state.trainState.answered || !state.trainState.currentHand) return;
            const range = findItemInTreeById(state.tree, state.trainState.currentRangeId); if (!range) return;
            const hand = state.trainState.currentHand;
            const chartEntries = range.chart?.[hand] || []; const norm = normalizeChartEntry(chartEntries);
            let correctId = null, correctMix = null;
            if (norm.length === 0) correctId = BUILTIN_FOLD_ID;
            else if (norm.length === 1) correctId = norm[0].brushId;
            else correctMix = norm.map(e => `${e.brushId}:${e.pct}`).join(',');
            let correct = false;
            if (correctMix) correct = (typeof answerBrushId === 'string' && answerBrushId.startsWith('mixture_') && patternKey === correctMix);
            else correct = (answerBrushId === correctId);
            state.trainState.answered = true;
            if (correct) { state.trainCounts.correct++; state.trainState.feedback = '✅ Верно!'; }
            else { state.trainCounts.wrong++; let correctText = correctMix ? (getMixedPatternsFromRange(range).find(m => m.key === correctMix)?.entries.map(e => getBrushById(e.brushId)?.name).join('/') || 'смесь') : getBrushById(correctId)?.name || correctId; state.trainState.feedback = `❌ Неверно. Правильно: ${correctText}`; }
            document.getElementById('train-feedback').textContent = state.trainState.feedback;
            state.statistics.train.push({ hand, answer: answerBrushId, correct, correctType: correctMix ? 'mixture' : 'single', timestamp: Date.now(), rangeId: range.id, modelId: state.activeSelectionModelId });
            saveData(); updateTrainScore();
            state.trainState.timeoutId = setTimeout(startTraining, correct ? 500 : 1800);
        }
        function getPositionsForPlayers(n, heroPos) {
            let base; if (n <= 2) base = ['SB','BB'];
            else if (n <= 6) base = ['SB','BB','UTG','MP','CO','BTN'].slice(0, n);
            else { const extra = n - 6; base = ['SB','BB','UTG']; for (let i = 1; i <= extra; i++) base.push('MP' + i); base.push('CO','BTN'); base = base.slice(0, n); }
            const idx = base.indexOf(heroPos); const startIdx = idx !== -1 ? idx : 0;
            return [...base.slice(startIdx), ...base.slice(0, startIdx)];
        }
        function updatePokerTable(scenario) {
            const table = document.getElementById('poker-table'); table.querySelectorAll('.seat').forEach(s => s.remove());
            const players = scenario?.players || 6;
            const positions = getPositionsForPlayers(players, scenario?.position || 'BTN'); const heroIdx = 0;
            positions.forEach((pos, i) => {
                const seat = document.createElement('div'); seat.className = 'seat';
                const angle = (i / players) * 2 * Math.PI + Math.PI/2; const radius = 110;
                seat.style.left = (140 + radius * Math.cos(angle) - 22) + 'px';
                seat.style.top = (140 + radius * Math.sin(angle) - 22) + 'px';
                seat.textContent = pos;
                if (pos === 'BTN' || (players === 2 && pos === 'SB')) { const d = document.createElement('div'); d.style.width='16px'; d.style.height='16px'; d.style.background='white'; d.style.borderRadius='50%'; d.style.position='absolute'; d.style.top='-8px'; d.style.right='-8px'; d.style.boxShadow='0 0 6px #fff'; seat.appendChild(d); }
                if (scenario?.actionBefore !== 'none' && i === (heroIdx+1)%players) {
                    const badge = document.createElement('div'); badge.style.position = 'absolute'; badge.style.bottom = '-28px'; badge.style.left = '50%'; badge.style.transform = 'translateX(-50%)'; badge.style.fontSize = '0.7rem'; badge.style.fontWeight = 'bold'; badge.style.color = '#fbbf24'; badge.style.background = 'rgba(0,0,0,0.7)'; badge.style.padding = '2px 6px'; badge.style.borderRadius = '4px'; badge.style.whiteSpace = 'nowrap';
                    badge.textContent = scenario.actionBefore.toUpperCase() + (scenario.raiseSize ? ' ' + scenario.raiseSize+'bb' : '');
                    seat.appendChild(badge);
                }
                table.appendChild(seat);
            });
        }
        document.getElementById('btn-toggle-grid-train').onclick = () => {
            state.trainState.showGrid = !state.trainState.showGrid;
            document.getElementById('grid-wrapper').classList.toggle('invisible', !state.trainState.showGrid);
            if (state.trainState.showGrid && state.trainState.currentRangeId) { updateCellsForRange(state.trainState.currentRangeId, true); if (state.trainState.currentHand) highlightCellInTrain(state.trainState.currentHand); }
        };

        function updateMemoryBrushButtons(range) {
            const container = document.getElementById('memory-brush-buttons'); container.innerHTML = '';
            if (!range) return;
            const usedIds = getBrushIdsFromRange(range);
            const sortedBrushes = state.brushes.filter(b => usedIds.has(b.id));
            sortedBrushes.forEach(brush => {
                const btn = document.createElement('button');
                btn.style.background = brush.color; btn.textContent = brush.name;
                if (state.memoryState.selectedMemBrushId === brush.id) btn.style.border = '2px solid white';
                btn.onclick = () => { state.memoryState.selectedMemBrushId = brush.id; updateMemoryBrushButtons(range); };
                container.appendChild(btn);
            });
            getMixedPatternsFromRange(range).forEach(mix => {
                const btn = document.createElement('div'); btn.className = 'mixture-btn'; btn.style.width = '90px';
                mix.entries.forEach(e => { const s = document.createElement('div'); s.className = 'mixture-stripe'; s.style.width = e.pct+'%'; s.style.background = getBrushById(e.brushId)?.color || DEFAULT_FOLD_COLOR; btn.appendChild(s); });
                btn.onclick = () => applyMemoryBrushForMixture(mix.key); container.appendChild(btn);
            });
        }
        function applyMemoryBrushForMixture(patternKey) {
            const range = getActiveRange(); if (!range) return;
            Object.entries(range.chart || {}).forEach(([hand, entries]) => { if (normalizeChartEntry(entries).map(e => `${e.brushId}:${e.pct}`).join(',') === patternKey) { state.memoryState.userChart[hand] = normalizeChartEntry(entries)[0].brushId; renderMemoryCell(hand); } });
        }
        function checkMemory() {
            const range = getActiveRange(); if (!range) return;
            let correct = 0, wrong = 0;
            cellElements.forEach((cell, hand) => {
                const userBrush = state.memoryState.userChart[hand] || BUILTIN_FOLD_ID;
                const dominant = getDominantBrushId(range.chart || {}, hand);
                cell.classList.remove('memory-correct','memory-wrong');
                if (userBrush === dominant) { correct++; cell.classList.add('memory-correct'); } else { wrong++; cell.classList.add('memory-wrong'); }
            });
            state.memoryCounts.correct += correct; state.memoryCounts.wrong += wrong;
            state.statistics.memory.push({ hand:'all', correct, wrong, timestamp: Date.now(), rangeId: range.id, modelId: null }); saveData();
        }
        document.getElementById('btn-check-memory').onclick = checkMemory;
        document.getElementById('btn-toggle-grid-memory').onclick = () => { state.memoryState.showGrid = !state.memoryState.showGrid; document.getElementById('grid-wrapper').classList.toggle('invisible', !state.memoryState.showGrid); };

        function updateReportModelSelect() {
            const select = document.getElementById('report-model-select');
            select.innerHTML = '<option value="__all__">Все модели</option>';
            getAllModelsFromTree(state.selectionTree).forEach(m => { const opt = document.createElement('option'); opt.value = m.id; opt.textContent = m.name; select.appendChild(opt); });
            select.value = state.reportSelectedModelId || '__all__';
        }
        function getItemStats(item, stats, modelId) {
            const ranges = item.type === 'folder' ? getAllRangesFromTree(item.children) : [item];
            let relevant = stats.filter(s => ranges.some(r => r.id === s.rangeId));
            if (modelId && modelId !== '__all__') relevant = relevant.filter(s => s.modelId === modelId);
            const total = relevant.length; const correct = relevant.filter(s => s.correct).length;
            const accuracy = total ? Math.round(correct / total * 100) : 0;
            return { correct, total, accuracy };
        }
        function renderReportTreeItems(items, container, depth, stats, modelId) {
            items.forEach(item => {
                const div = document.createElement('div'); div.className = 'tree-item'; div.style.paddingLeft = (depth*14+6)+'px';
                const icon = item.type === 'folder' ? (state.reportExpandedFolders.has(item.id) ? '📂' : '📁') : '📄';
                const { correct, total, accuracy } = getItemStats(item, stats, modelId);
                div.innerHTML = `<span>${icon}</span> ${item.name} <span style="margin-left:auto;">${accuracy}% (${correct}/${total})</span>`;
                if (state.reportSelectedId === item.id) div.classList.add('active-tree');
                div.onclick = () => { if (item.type === 'folder') { state.reportExpandedFolders.has(item.id) ? state.reportExpandedFolders.delete(item.id) : state.reportExpandedFolders.add(item.id); } state.reportSelectedId = item.id; renderReport(); };
                container.appendChild(div);
                if (item.type === 'folder' && state.reportExpandedFolders.has(item.id)) renderReportTreeItems(item.children, container, depth+1, stats, modelId);
            });
        }
        function renderReport() {
            const mode = document.getElementById('report-mode-select').value;
            const stats = mode === 'train' ? state.statistics.train : state.statistics.memory;
            const modelId = document.getElementById('report-model-select').value;
            state.reportSelectedModelId = modelId;

            const treeContainer = document.getElementById('report-tree-container'); treeContainer.innerHTML = '';
            const allItem = document.createElement('div'); allItem.className = 'tree-item';
            const allStats = getItemStats({ type: 'folder', children: state.tree }, stats, modelId);
            allItem.innerHTML = `<span>🌐 Все диапазоны</span> <span style="margin-left:auto;">${allStats.accuracy}% (${allStats.correct}/${allStats.total})</span>`;
            if (state.reportSelectedId === '__all__') allItem.classList.add('active-tree');
            allItem.onclick = () => { state.reportSelectedId = '__all__'; renderReport(); };
            treeContainer.appendChild(allItem);
            renderReportTreeItems(state.tree, treeContainer, 0, stats, modelId);

            const filtered = filterStatsBySelection(stats, modelId);
            const total = filtered.length; const correctCount = filtered.filter(r => r.correct).length;
            document.getElementById('report-accuracy').textContent = `Точность: ${correctCount}/${total} (${total ? Math.round(correctCount/total*100) : 0}%)`;
            const details = document.getElementById('report-details'); details.innerHTML = '';
            if (state.reportSelectedId === '__all__') {
                getAllRangesFromTree(state.tree).forEach(r => { const rs = filtered.filter(s => s.rangeId === r.id); const c = rs.filter(s => s.correct).length; const t = rs.length; details.innerHTML += `<div>${r.name}: ${c}/${t} (${t ? Math.round(c/t*100) : 0}%)</div>`; });
            }
            const errorMap = new Map();
            filtered.forEach(s => { const hand = s.hand || '?'; if (!errorMap.has(hand)) errorMap.set(hand, { total:0, errors:0 }); const e = errorMap.get(hand); e.total++; if (!s.correct) e.errors++; });
            const sorted = Array.from(errorMap.entries()).sort((a,b) => (b[1].errors/b[1].total) - (a[1].errors/a[1].total));
            details.innerHTML += '<h4>Ошибки по рукам:</h4>';
            sorted.forEach(([hand, e]) => { details.innerHTML += `<div>${hand}: ${e.errors}/${e.total} (${Math.round(e.errors/e.total*100)}%)</div>`; });

            const modelsContainer = document.getElementById('report-models-list'); modelsContainer.innerHTML = '';
            const allModels = getAllModelsFromTree(state.selectionTree);
            if (allModels.length > 0) {
                const baseFiltered = filterStatsBySelection(stats, '__all__');
                modelsContainer.innerHTML = '<h4>Модели:</h4>';
                allModels.forEach(model => { const ms = baseFiltered.filter(s => s.modelId === model.id); const c = ms.filter(s => s.correct).length; const t = ms.length; const acc = t ? Math.round(c/t*100) : 0; modelsContainer.innerHTML += `<div>${model.name}: ${acc}% (${c}/${t})</div>`; });
            } else { modelsContainer.innerHTML = '<p style="color:#888;">Нет моделей</p>'; }

            if (state.reportSelectedId !== '__all__') {
                const range = findItemInTreeById(state.tree, state.reportSelectedId);
                if (range) {
                    updateCellsForRange(range.id, false);
                    const handCounts = new Map();
                    filtered.filter(s => s.rangeId === range.id).forEach(s => { if (!handCounts.has(s.hand)) handCounts.set(s.hand, 0); if (!s.correct) handCounts.set(s.hand, handCounts.get(s.hand) + 1); });
                    cellElements.forEach((cell, hand) => { const cnt = handCounts.get(hand) || 0; if (cnt > 0) { const badge = document.createElement('div'); badge.className = 'badge error'; badge.textContent = cnt; cell.appendChild(badge); } });
                }
            } else updateCellsForRange(null);
        }
        function filterStatsBySelection(stats, modelId) {
            let filtered = stats;
            if (state.reportSelectedId !== '__all__') { const item = findItemInTreeById(state.tree, state.reportSelectedId); if (!item) return []; const ranges = item.type === 'folder' ? getAllRangesFromTree(item.children) : [item]; filtered = filtered.filter(s => ranges.some(r => r.id === s.rangeId)); }
            if (modelId && modelId !== '__all__') filtered = filtered.filter(s => s.modelId === modelId);
            return filtered;
        }
        document.getElementById('report-mode-select').onchange = renderReport;
        document.getElementById('report-model-select').onchange = renderReport;
        document.getElementById('btn-reset-stats').onclick = async () => { if (await customConfirm('Сбросить статистику?')) { state.statistics = { train:[], memory:[] }; state.trainCounts = { correct:0, wrong:0 }; state.memoryCounts = { correct:0, wrong:0 }; saveData(); renderReport(); } };

        function startTimer(mode) { stopTimer(); state.timerMode = mode; state.timerStart = Date.now(); state.timerInterval = setInterval(updateTimerDisplay, 500); }
        function stopTimer() { if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; } }
        function updateTimerDisplay() { const elapsed = Math.floor((Date.now() - state.timerStart) / 1000); document.getElementById('timer-display').textContent = `${String(Math.floor(elapsed/60)).padStart(2,'0')}:${String(elapsed%60).padStart(2,'0')}`; }
        document.getElementById('btn-reset-timer').onclick = () => { if (state.timerMode) startTimer(state.timerMode); };

        function customConfirm(msg) {
            return new Promise(resolve => {
                document.getElementById('confirm-message').textContent = msg;
                document.getElementById('confirm-modal').style.display = 'flex';
                const cleanup = (v) => { document.getElementById('confirm-modal').style.display = 'none'; resolve(v); };
                document.getElementById('confirm-yes').onclick = () => cleanup(true);
                document.getElementById('confirm-no').onclick = () => cleanup(false);
                document.getElementById('confirm-modal').onclick = (e) => { if (e.target === document.getElementById('confirm-modal')) cleanup(false); };
            });
        }

        document.getElementById('btn-export').onclick = () => {
            const data = { version:4, brushes: state.brushes, tree: state.tree, statistics: state.statistics, selectionTree: state.selectionTree };
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `preflop_trainer_v4_${new Date().toISOString().slice(0,10)}.json`; a.click();
        };
        document.getElementById('btn-import').onclick = () => document.getElementById('import-file-input').click();
        document.getElementById('import-file-input').onchange = async function() {
            const file = this.files[0]; if (!file) return;
            const text = await file.text();
            try {
                const data = JSON.parse(text);
                if (data.version !== 4) { alert('Неверная версия данных'); return; }
                if (!await customConfirm('Импортировать данные? Текущие будут заменены.')) return;
                state.brushes = data.brushes; state.tree = data.tree; state.statistics = data.statistics;
                if (data.selectionTree) state.selectionTree = data.selectionTree;
                else if (data.selectionModels) state.selectionTree = data.selectionModels.map(m => ({ id:m.id, type:'model', name:m.name, marks:m.marks||{} }));
                else state.selectionTree = [];
                state.activeSelectionModelId = null; state.selectedBrushes.clear();
                ensureBuiltinFold(); saveData();
                setMode('editor'); fullRender();
            } catch (e) { alert('Ошибка чтения файла'); }
        };

        async function refreshChartsFromFile() {
            try {
                const resp = await fetch('default_ranges.json');
                if (!resp.ok) { alert('Не удалось загрузить default_ranges.json'); return; }
                const data = await resp.json();
                if (data.version !== 4) { alert('Неверная версия данных'); return; }
                state.brushes = data.brushes || state.brushes;
                state.tree = data.tree || state.tree;
                state.selectionTree = data.selectionTree || (data.selectionModels ? data.selectionModels.map(m => ({ id: m.id, type: 'model', name: m.name, marks: m.marks || {} })) : []);
                ensureBuiltinFold();
                saveData();
                fullRender();
                alert('Чарты и модели обновлены!');
            } catch (e) { alert('Ошибка обновления'); }
        }
        document.getElementById('btn-refresh-charts').onclick = refreshChartsFromFile;

        async function autoLoadRanges() {
            const params = new URLSearchParams(window.location.search);
            const loadParam = params.get('load');
            const alreadyHasData = (state.tree.length > 0 || state.brushes.length > 1);

            const applyRangesWithoutStats = (data) => {
                state.brushes = data.brushes || state.brushes;
                state.tree = data.tree || state.tree;
                state.selectionTree = data.selectionTree || (data.selectionModels ? data.selectionModels.map(m => ({ id: m.id, type: 'model', name: m.name, marks: m.marks || {} })) : []);
                if (!alreadyHasData) {
                    state.statistics = data.statistics || { train: [], memory: [] };
                    state.trainCounts = data.trainCounts || { correct: 0, wrong: 0 };
                    state.memoryCounts = data.memoryCounts || { correct: 0, wrong: 0 };
                }
                ensureBuiltinFold();
                saveData();
                return true;
            };

            if (loadParam) {
                try {
                    const resp = await fetch(loadParam);
                    if (resp.ok) {
                        const data = await resp.json();
                        if (data.version === 4) return applyRangesWithoutStats(data);
                    }
                } catch (e) {}
            }
            if (!alreadyHasData) {
                try {
                    const resp = await fetch('default_ranges.json');
                    if (resp.ok) {
                        const data = await resp.json();
                        if (data.version === 4) return applyRangesWithoutStats(data);
                    }
                } catch (e) {}
            }
            return false;
        }

        function fullRender() { renderBrushes(); renderTree(); updateCellsForRange(state.activeRangeId, true); }

        window.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
            if (e.key === 'F2' && state.mode === 'editor' && state.activeTreeElementId) { const item = findItemInTreeById(state.tree, state.activeTreeElementId); if (item) startRename(item); }
            if (e.key === 'T' && !e.ctrlKey && !e.metaKey) { const modes = ['editor','selection','train','memory','report']; setMode(modes[(modes.indexOf(state.mode) + 1) % modes.length]); }
            if (state.mode === 'train' && !state.trainState.answered) {
                const kmap = { r:'РЕЙЗ', к:'КОЛЛ', c:'КОЛЛ', f:'ФОЛД', а:'ФОЛД', a:'АЛЛ-ИН', ф:'АЛЛ-ИН' };
                const act = kmap[e.key.toLowerCase()];
                if (act) { const range = findItemInTreeById(state.tree, state.trainState.currentRangeId); if (range) { const brush = state.brushes.find(b => b.type === act); if (brush) handleTrainingAnswer(brush.id); } }
            }
        });

        async function init() {
            if (!loadData()) { state.brushes = []; state.tree = []; state.statistics = { train: [], memory: [] }; }
            ensureBuiltinFold(); buildGrid();
            const loaded = await autoLoadRanges();
            if (loaded) fullRender();
            setMode('editor');
        }
        document.getElementById('btn-add-folder').onclick = addFolder;
        document.getElementById('btn-add-range').onclick = addRange;
        init();
    })();
</script>
