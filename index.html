<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Префлоп-тренажёр v4</title>
    <style>
        :root {
            --bg: #1a1d23;
            --panel-bg: #21252b;
            --text: #d4d4d4;
            --text-secondary: #9ca3af;
            --border: #3a3f4b;
            --accent: #6366f1;
            --accent-hover: #5558e6;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --cell-size: clamp(44px, 5.5vw, 60px);
            --cell-label-size: clamp(14px, 2vw, 18px);
            --radius: 8px;
            --radius-sm: 5px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #left-panel {
            width: 360px; min-width: 360px; background: var(--panel-bg);
            border-right: 1px solid var(--border); display: flex; flex-direction: column;
            height: 100vh; overflow-y: auto; overflow-x: hidden; padding: 12px; gap: 10px; z-index: 10;
        }

        #right-panel {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 16px; overflow: auto; position: relative;
        }

        #grid-wrapper { display: flex; flex-direction: column; gap: 1px; transition: opacity 0.3s; }
        #grid-wrapper.invisible { opacity: 0.08; pointer-events: none; }

        .grid-row-cells { display: flex; gap: 1px; justify-content: center; }

        .cell {
            width: var(--cell-size); height: var(--cell-size); background: #1e2128;
            border: 2px solid transparent; display: flex; flex-direction: column; overflow: hidden;
            position: relative; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s;
            border-radius: 2px; flex-shrink: 0;
        }
        .cell:hover { border-color: #555; z-index: 2; }
        .cell.train-marked { border-color: #c084fc !important; box-shadow: inset 0 0 0 1px #c084fc44; }
        .cell.active-train-hand { border-color: #fbbf24 !important; animation: activeGlow 0.8s ease-in-out infinite; z-index: 3; }
        .cell.memory-correct { border-color: var(--success) !important; box-shadow: 0 0 6px #22c55e55; }
        .cell.memory-wrong { border-color: var(--danger) !important; box-shadow: 0 0 6px #ef444455; }
        @keyframes activeGlow {
            0%,100% { box-shadow: 0 0 4px #fbbf2444; }
            50% { box-shadow: 0 0 14px #fbbf2499; }
        }

        .stripe { width: 100%; flex-shrink: 0; min-height: 0; transition: height 0.1s; }

        .cell-label {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            font-size: var(--cell-label-size); font-weight: 900; color: #fff;
            text-shadow: 0 0 6px rgba(0,0,0,0.9), 0 0 3px rgba(0,0,0,0.9); pointer-events: none; z-index: 1; letter-spacing: -0.2px;
        }

        .badge {
            position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; border-radius: 50%;
            font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center;
            z-index: 4; color: #fff; pointer-events: none; line-height: 1; background: var(--danger);
        }
        .badge.success { background: var(--success); }

        .section-title {
            font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px;
            color: var(--text-secondary); margin: 4px 0 2px; padding: 0 2px;
        }

        #brush-list { display: flex; flex-wrap: wrap; gap: 6px; min-height: 28px; }
        .brush-chip {
            display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 20px;
            background: #2a2d35; border: 2px solid transparent; cursor: pointer; font-size: 12px; font-weight: 600;
            transition: all 0.15s; white-space: nowrap;
        }
        .brush-chip:hover { background: #343842; }
        .brush-chip.selected { border-color: var(--accent); background: #2e3140; box-shadow: 0 0 8px #6366f133; }
        .swatch { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; border: 1px solid #fff3; }
        .brush-chip .del-brush { margin-left: 2px; cursor: pointer; font-size: 14px; opacity: 0.5; color: #f99; line-height: 1; padding: 0 2px; border-radius: 50%; }
        .brush-chip .del-brush:hover { opacity: 1; background: #fff1; }

        #add-brush-form { background: #282c34; border-radius: var(--radius); padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }
        #add-brush-form.hidden { display: none; }
        #add-brush-form select, #add-brush-form input[type=text] {
            background: #1a1d23; border: 1px solid var(--border); color: var(--text); padding: 7px 10px;
            border-radius: var(--radius-sm); font-size: 13px; width: 100%; outline: none;
        }
        #add-brush-form select:focus, #add-brush-form input[type=text]:focus { border-color: var(--accent); }
        .color-palette { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        .color-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; flex-shrink: 0; }
        .color-dot:hover, .color-dot.active-dot { border-color: #fff; transform: scale(1.2); box-shadow: 0 0 8px currentColor; }
        #add-brush-form input[type=color] { width: 32px; height: 22px; border: 1px solid var(--border); border-radius: 3px; cursor: pointer; background: transparent; padding: 0; }
        .btn { padding: 7px 14px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.15s; letter-spacing: 0.3px; }
        .btn-accent { background: var(--accent); color: #fff; }
        .btn-accent:hover { background: var(--accent-hover); }
        .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
        .btn-ghost:hover { background: #fff1; color: #fff; }
        .btn-sm { padding: 4px 10px; font-size: 11px; }
        .btn-xs { padding: 3px 8px; font-size: 10px; border-radius: 3px; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: #dc2626; }

        #tree-container, #memory-tree-container, #report-tree-container {
            flex: 1; overflow-y: auto; min-height: 100px; max-height: 35vh; font-size: 12px;
        }
        .tree-item {
            display: flex; align-items: center; gap: 4px; padding: 3px 6px; border-radius: 4px;
            cursor: pointer; transition: background 0.1s; position: relative; min-height: 26px; white-space: nowrap;
        }
        .tree-item:hover { background: #ffffff08; }
        .tree-item.active-tree { background: #6366f122; outline: 1px solid #6366f155; }
        .tree-item.drag-over { outline: 2px dashed var(--accent); background: #6366f111; }
        .tree-item.drop-before { border-top: 2px solid var(--accent); }
        .tree-item.drop-after { border-bottom: 2px solid var(--accent); }
        .tree-item.drop-inside { background: var(--accent); }
        .tree-icon { flex-shrink: 0; font-size: 13px; width: 18px; text-align: center; }
        .tree-name { flex: 1; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
        .tree-name input { background: #1a1d23; border: 1px solid var(--accent); color: #fff; padding: 2px 5px; border-radius: 3px; font-size: 12px; width: 100%; outline: none; }
        .tree-checkbox { flex-shrink: 0; cursor: pointer; accent-color: var(--accent); width: 14px; height: 14px; }
        .tree-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
        .tree-item:hover .tree-actions { opacity: 1; }
        .tree-actions button { background: transparent; border: none; cursor: pointer; color: #aaa; font-size: 12px; padding: 2px 4px; border-radius: 3px; transition: all 0.1s; line-height: 1; }
        .tree-actions button:hover { color: #fff; background: #fff2; }
        .scenario-btn { opacity: 0.5; cursor: pointer; font-size: 12px; padding: 0 3px; transition: opacity 0.15s; flex-shrink: 0; }
        .tree-item:hover .scenario-btn { opacity: 1; }
        .scenario-btn:hover { opacity: 1 !important; color: #fbbf24; }
        .tree-accuracy { margin-left: auto; font-weight: 600; font-size: 11px; color: var(--text-secondary); padding-left: 8px; }

        .mode-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
        .mode-tab {
            flex: 1; min-width: 50px; padding: 8px 6px; border-radius: var(--radius-sm);
            border: 1px solid var(--border); background: transparent; color: var(--text-secondary);
            cursor: pointer; font-size: 11px; font-weight: 600; text-align: center; transition: all 0.15s; letter-spacing: 0.3px;
        }
        .mode-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
        .mode-tab:hover:not(.active) { background: #fff1; color: #fff; }

        #poker-table { width: 280px; height: 280px; border-radius: 50%; background: #1a3a1a; border: 3px solid #3a5a3a; position: relative; margin: 8px auto; flex-shrink: 0; }
        .seat { position: absolute; transform: translate(-50%,-50%); text-align: center; font-size: 16px; font-weight: 700; color: #fff; pointer-events: none; white-space: nowrap; z-index: 2; }
        .seat.hero { color: #fbbf24; font-size: 18px; }
        .seat .pos-label { display: block; font-size: 13px; opacity: 0.9; font-weight: 800; }
        .dealer-badge { position: absolute; top: -8px; right: -8px; width: 18px; height: 18px; border-radius: 50%; background: #fff; color: #000; font-size: 9px; font-weight: 900; display: flex; align-items: center; justify-content: center; line-height: 1; z-index: 3; }
        .action-badge-seat { font-size: 12px; background: #ef4444; color: #fff; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-top: 2px; font-weight: 700; }
        #train-hand-display { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 900; color: #fff; text-shadow: 0 0 20px #000, 0 0 40px #000; pointer-events: none; z-index: 5; letter-spacing: 1px; }
        #train-source-name, #memory-current-range { font-size: 14px !important; font-weight: 600; color: var(--text-secondary); text-align: center; }
        #train-stack { font-size: 16px !important; font-weight: 700; color: #fbbf24; text-align: center; }

        .answer-btn {
            padding: 12px 8px; font-size: 13px; font-weight: 700; border-radius: 8px;
            border: 2px solid transparent; cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px;
            text-align: center; min-width: 70px; color: #fff;
            position: relative; overflow: hidden; display: inline-flex; align-items: center; justify-content: center;
        }
        .answer-btn.mixture-btn { background: #444; }
        .mixture-stripe { position: absolute; top: 0; bottom: 0; }
        .mixture-label { position: relative; z-index: 2; font-weight: 700; }
        .answer-btn:active { transform: scale(0.96); }
        .answer-btn.correct-flash { animation: correctPulse 0.5s; border-color: #22c55e !important; }
        .answer-btn.wrong-flash { animation: wrongPulse 0.5s; border-color: #ef4444 !important; }
        @keyframes correctPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
        @keyframes wrongPulse { 0%,100%{transform:scale(1)} 30%{transform:scale(0.94)} 60%{transform:scale(1.03)} }

        #train-feedback { text-align: center; font-weight: 700; font-size: 15px; min-height: 24px; transition: color 0.2s; }
        #train-feedback.correct { color: #4ade80; }
        #train-feedback.wrong { color: #f87171; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .modal-overlay.hidden { display: none; }
        .modal { background: #21252b; border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; min-width: 300px; max-width: 400px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .modal h3 { margin: 0; font-size: 16px; letter-spacing: 0.5px; }
        .modal label { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        .modal select, .modal input { background: #1a1d23; border: 1px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: var(--radius-sm); font-size: 13px; width: 100%; outline: none; }
        .modal select:focus, .modal input:focus { border-color: var(--accent); }
        .modal .btn-row { display: flex; gap: 8px; justify-content: flex-end; }

        #report-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 6px; }
        #report-table th, #report-table td { padding: 4px 6px; border-bottom: 1px solid var(--border); text-align: center; }
        #report-table th { color: var(--text-secondary); font-weight: 600; font-size: 10px; letter-spacing: 0.5px; }
        #report-table .err-high { color: #f87171; font-weight: 700; }
        #report-table .err-mid { color: #fbbf24; font-weight: 700; }
        #report-table .err-low { color: #4ade80; }

        .timer-display { font-variant-numeric: tabular-nums; font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; font-size: 18px; font-weight: 700; letter-spacing: 1px; text-align: center; padding: 4px; }
        .divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }
        .overall-accuracy { font-weight: 700; font-size: 14px; margin-bottom: 4px; color: var(--success); text-align: center; }
        .range-accuracy-item { font-size: 11px; padding: 2px 6px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        @media (max-width: 768px) {
            #left-panel { width: 280px; min-width: 280px; padding: 8px; gap: 6px; font-size: 11px; }
            :root { --cell-size: clamp(32px, 8vw, 44px); --cell-label-size: clamp(11px, 2.5vw, 14px); }
            .answer-btn { padding: 10px 5px; font-size: 11px; }
            #poker-table { width: 200px; height: 200px; }
            #train-hand-display { font-size: 2.2rem; }
            .seat { font-size: 12px; } .seat.hero { font-size: 13px; } .seat .pos-label { font-size: 10px; }
            .action-badge-seat { font-size: 10px; }
            #train-stack { font-size: 13px !important; }
            #train-source-name, #memory-current-range { font-size: 12px !important; }
        }
    </style>
</head>
<body>
<div id="left-panel">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
        <span style="font-weight:700;font-size:16px;letter-spacing:0.5px;">♠️ Префлоп</span>
        <div style="display:flex;gap:4px;">
            <button class="btn btn-ghost btn-xs" id="btn-export" title="Экспорт">📥</button>
            <button class="btn btn-ghost btn-xs" id="btn-import" title="Импорт">📤</button>
            <input type="file" id="import-file" accept=".json" style="display:none;">
        </div>
    </div>
    <div class="timer-display" id="timer-display">00:00</div>
    <button class="btn btn-ghost btn-xs" id="btn-reset-timer" style="align-self:center;">Сброс таймера</button>
    <hr class="divider">
    <div class="mode-tabs" id="mode-tabs">
        <button class="mode-tab active" data-mode="editor">✏️ Ред.</button>
        <button class="mode-tab" data-mode="train">🎯 Трен.</button>
        <button class="mode-tab" data-mode="memory">🧠 Память</button>
        <button class="mode-tab" data-mode="report">📊 Отчёт</button>
    </div>
    <hr class="divider">

    <div id="section-editor-brushes"><div class="section-title">🎨 Кисти</div><div id="brush-list"></div><button class="btn btn-ghost btn-sm" id="btn-add-brush" style="margin-top:4px;">+ Добавить кисть</button><div id="add-brush-form" class="hidden"><select id="brush-type-select"><option value="РЕЙЗ">РЕЙЗ</option><option value="КОЛЛ">КОЛЛ</option><option value="ФОЛД">ФОЛД</option><option value="АЛЛ-ИН">АЛЛ-ИН</option><option value="ЧЕК">ЧЕК</option></select><input type="text" id="brush-name-input" placeholder="Название кисти"><div class="color-palette" id="color-palette"></div><input type="color" id="brush-color-input" value="#6366f1"><div style="display:flex;gap:6px;"><button class="btn btn-accent btn-sm" id="btn-save-brush">Сохранить</button><button class="btn btn-ghost btn-sm" id="btn-cancel-brush">Отмена</button></div></div></div>
    <div id="section-editor-tree" style="display:flex;flex-direction:column;flex:1;min-height:0;"><div class="section-title" style="display:flex;align-items:center;justify-content:space-between;">📁 Дерево диапазонов <button class="btn btn-ghost btn-xs" id="btn-add-folder">+ Папка</button> <button class="btn btn-ghost btn-xs" id="btn-add-range">+ Диапазон</button></div><div id="tree-container"></div></div>

    <div id="section-train" style="display:none;flex-direction:column;gap:8px;"><div class="section-title">🎯 Тренировка</div><div id="train-source-name">—</div><div id="train-stack"></div><div id="poker-table"><div id="train-hand-display"></div></div><div id="train-feedback"></div><div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:center;" id="train-answers"></div><div style="display:flex;gap:4px;align-items:center;font-size:11px;"><span>Верно: <b id="train-correct-count">0</b></span><span>Неверно: <b id="train-wrong-count">0</b></span><button class="btn btn-ghost btn-xs" id="btn-toggle-grid-train" style="margin-left:auto;">👁 Сетка</button></div></div>
    <div id="section-memory" style="display:none;flex-direction:column;gap:8px;"><div class="section-title">🧠 Память</div><div id="memory-tree-container" style="max-height:180px;"></div><div id="memory-current-range">—</div><div style="display:flex;gap:4px;flex-wrap:wrap;" id="memory-brush-buttons"></div><button class="btn btn-accent btn-sm" id="btn-check-memory">Проверить</button><div id="memory-result" style="font-size:12px;text-align:center;min-height:18px;"></div><div style="display:flex;gap:4px;align-items:center;font-size:11px;"><span>Верно: <b id="memory-correct-count">0</b></span><span>Неверно: <b id="memory-wrong-count">0</b></span><button class="btn btn-ghost btn-xs" id="btn-toggle-grid-memory" style="margin-left:auto;">👁 Сетка</button></div></div>
    <div id="section-report" style="display:none;flex-direction:column;gap:6px;"><div class="section-title">📊 Отчёт</div><select id="report-mode-select" style="background:#1a1d23;border:1px solid var(--border);color:var(--text);padding:6px;border-radius:4px;font-size:12px;"><option value="train">Тренировка</option><option value="memory">Память</option></select><div id="report-tree-container" style="max-height:200px;overflow-y:auto;"></div><div id="report-overall-accuracy" class="overall-accuracy"></div><div id="report-range-accuracy" style="max-height:120px;overflow-y:auto;"></div><div id="report-table-container" style="max-height:180px;overflow-y:auto;"></div><button class="btn btn-danger btn-xs" id="btn-reset-stats">Сбросить статистику</button></div>
</div>
<div id="right-panel"><div id="grid-wrapper"><div id="grid-main"></div></div></div>

<div class="modal-overlay hidden" id="scenario-modal"><div class="modal"><h3>⚙️ Сценарий раздачи</h3><label>Позиция героя</label><select id="scenario-position"><option value="UTG">UTG</option><option value="UTG+1">UTG+1</option><option value="MP">MP</option><option value="MP+1">MP+1</option><option value="CO">CO</option><option value="BTN">BTN</option><option value="SB">SB</option><option value="BB">BB</option><option value="BB+1">BB+1</option></select><label>Количество игроков</label><input type="number" id="scenario-players" min="2" max="9" value="6"><label>Эффективный стек (bb)</label><input type="number" id="scenario-stack" min="10" max="500" value="100"><label>Действие перед нами</label><select id="scenario-action"><option value="none">Нет</option><option value="limp">Лимп</option><option value="raise">Рейз</option><option value="3bet">3-бет</option><option value="allin">Алл-ин</option></select><div id="scenario-raise-size-container"><label>Размер рейза (bb)</label><input type="number" id="scenario-raise-size" min="1" max="200" value="2.5" step="0.1"></div><div class="btn-row"><button class="btn btn-ghost btn-sm" id="btn-scenario-cancel">Отмена</button><button class="btn btn-accent btn-sm" id="btn-scenario-save">Сохранить</button></div></div></div>

<div class="modal-overlay hidden" id="confirm-modal">
    <div class="modal" style="max-width: 320px;">
        <h3 id="confirm-message">Вы уверены?</h3>
        <div class="btn-row">
            <button class="btn btn-ghost btn-sm" id="confirm-no">Отмена</button>
            <button class="btn btn-danger btn-sm" id="confirm-yes">Да</button>
        </div>
    </div>
</div>

<script>
(function() {
    const RANKS = ['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
    const DEFAULT_FOLD_COLOR = '#5a5f6b';
    const BUILTIN_FOLD_ID = 'builtin-fold';
    const STORAGE_KEY = 'preflop_trainer_v4';
    const DATA_VERSION = 4;
    const POPULAR_COLORS = ['#ef4444','#f97316','#f59e0b','#eab308','#22c55e','#14b8a6','#06b6d4','#3b82f6','#6366f1','#8b5cf6','#ec4899','#6b7280'];
    const ACTION_TYPES = ['РЕЙЗ','КОЛЛ','ФОЛД','АЛЛ-ИН','ЧЕК'];
    const ACTION_COLORS = {'РЕЙЗ':'#4ade80','КОЛЛ':'#60a5fa','ФОЛД':'#9ca3af','АЛЛ-ИН':'#f87171','ЧЕК':'#a3e635'};

    let state = {
        mode: 'editor', brushes: [], tree: [], activeRangeId: null, activeTreeElementId: null,
        selectedBrushes: new Set(), trainCounts: { correct:0, wrong:0 }, memoryCounts: { correct:0, wrong:0 },
        isDrawing: false, isShiftDrawing: false,
        trainState: { currentHand:null, currentRangeId:null, answered:false, feedback:'', showGrid:true, timeoutId:null },
        memoryState: { userChart:{}, checked:false, selectedMemBrushId: BUILTIN_FOLD_ID, showGrid:true },
        statistics: { train:[], memory:[] }, timerInterval:null, timerMode:null, timerStart:0,
        reportSelectedId: '__all__',
        reportExpandedFolders: new Set()
    };
    let cellElements = new Map();
    let scenarioEditingRangeId = null;

    function customConfirm(message) {
        return new Promise((resolve) => {
            const modal = document.getElementById('confirm-modal');
            const msg = document.getElementById('confirm-message');
            const yesBtn = document.getElementById('confirm-yes');
            const noBtn = document.getElementById('confirm-no');
            msg.textContent = message;
            modal.classList.remove('hidden');
            yesBtn.onclick = () => { modal.classList.add('hidden'); resolve(true); };
            noBtn.onclick = () => { modal.classList.add('hidden'); resolve(false); };
        });
    }

    function genId() { return 'id_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8); }
    function getHandName(r,c) { if(r===c) return RANKS[r]+RANKS[c]; if(r<c) return RANKS[r]+RANKS[c]+'s'; return RANKS[c]+RANKS[r]+'o'; }
    function getAllHands() { const h=[]; for(let r=0;r<13;r++) for(let c=0;c<13;c++) h.push(getHandName(r,c)); return h; }
    function deepClone(o) { return JSON.parse(JSON.stringify(o)); }
    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ version:DATA_VERSION, brushes:state.brushes, tree:state.tree, statistics:state.statistics, trainCounts:state.trainCounts, memoryCounts:state.memoryCounts })); }
    function loadData() { const raw=localStorage.getItem(STORAGE_KEY); if(!raw) return false; try { const data=JSON.parse(raw); if(data.version!==DATA_VERSION) return false; state.brushes=data.brushes||[]; state.tree=data.tree||[]; state.statistics=data.statistics||{train:[],memory:[]}; state.trainCounts=data.trainCounts||{correct:0,wrong:0}; state.memoryCounts=data.memoryCounts||{correct:0,wrong:0}; state.selectedBrushes=new Set([BUILTIN_FOLD_ID]); return true; } catch(e) { return false; } }
    function ensureBuiltinFold() { if(!state.brushes.some(b=>b.id===BUILTIN_FOLD_ID)) state.brushes.unshift({id:BUILTIN_FOLD_ID, type:'ФОЛД', name:'ФОЛД', color:DEFAULT_FOLD_COLOR, builtin:true}); if(state.selectedBrushes.size===0) state.selectedBrushes.add(BUILTIN_FOLD_ID); if(!state.memoryState.selectedMemBrushId||!getBrushById(state.memoryState.selectedMemBrushId)) state.memoryState.selectedMemBrushId=BUILTIN_FOLD_ID; }
    function getBrushById(id) { return state.brushes.find(b=>b.id===id); }
    function getActiveRange() { return state.activeRangeId ? findItemInTreeById(state.tree, state.activeRangeId) : null; }
    function findItemInTreeById(tree, id) { for(const item of tree) { if(item.id===id) return item; if(item.type==='folder'&&item.children) { const f=findItemInTreeById(item.children,id); if(f) return f; } } return null; }
    function findParentInTree(tree, id, parent=null) { for(let i=0;i<tree.length;i++) { const item=tree[i]; if(item.id===id) return { parent, index: i, array: tree }; if(item.type==='folder'&&item.children) { const found=findParentInTree(item.children, id, item); if(found) return found; } } return null; }
    function removeItemFromTree(tree, id) { for(let i=0;i<tree.length;i++) { if(tree[i].id===id) return tree.splice(i,1)[0]; if(tree[i].type==='folder'&&tree[i].children) { const r=removeItemFromTree(tree[i].children,id); if(r) return r; } } return null; }
    function insertAfterInTree(tree, targetId, item) { for(let i=0;i<tree.length;i++) { if(tree[i].id===targetId) { tree.splice(i+1,0,item); return true; } if(tree[i].type==='folder'&&tree[i].children) { if(insertAfterInTree(tree[i].children,targetId,item)) return true; } } return false; }
    function getAllRangesFromTree(tree) { let r=[]; for(const item of tree) { if(item.type==='range') r.push(item); if(item.type==='folder'&&item.children) r=r.concat(getAllRangesFromTree(item.children)); } return r; }
    function getRangePath(rangeId) { function findPath(tree, targetId, cur) { for(const item of tree) { if(item.id===targetId&&item.type==='range') return [...cur, item.name]; if(item.type==='folder'&&item.children) { const f=findPath(item.children, targetId, [...cur, item.name]); if(f) return f; } } return null; } const p=findPath(state.tree, rangeId, []); return p?p.join(' > '):''; }
    function getAllDescendantRangeIds(folder) { let ids=[]; if(!folder.children) return ids; for(const child of folder.children) { if(child.type==='range') ids.push(child.id); else if(child.type==='folder') ids=ids.concat(getAllDescendantRangeIds(child)); } return ids; }
    function setTrainEnabledForFolder(folder, enabled) { for(const id of getAllDescendantRangeIds(folder)) { const r=findItemInTreeById(state.tree, id); if(r) r.trainEnabled=enabled; } }
    function getFolderCheckboxState(folder) { const ids=getAllDescendantRangeIds(folder); if(ids.length===0) return {checked:false,indeterminate:false}; let hasE=false, hasD=false; for(const id of ids) { const r=findItemInTreeById(state.tree,id); if(r) { if(r.trainEnabled) hasE=true; else hasD=true; } } if(hasE&&hasD) return {checked:false,indeterminate:true}; return {checked:hasE,indeterminate:false}; }
    function normalizeChartEntry(entries) { if(!entries||entries.length===0) return []; const total=entries.reduce((s,e)=>s+(e.pct||0),0); if(total===0) return []; let n=entries.filter(e=>e.pct>0).map(e=>({brushId:e.brushId,pct:e.pct})); if(n.length===0) return []; if(total>100) { const scale=100/total; n=n.map(e=>({brushId:e.brushId,pct:Math.round(e.pct*scale)})); const nt=n.reduce((s,e)=>s+e.pct,0); if(nt<100&&n.length>0) n[0].pct+=(100-nt); } if(total<100&&n.length>0) { const nt=n.reduce((s,e)=>s+e.pct,0); if(nt<100) n.push({brushId:BUILTIN_FOLD_ID,pct:100-nt}); } return n.filter(e=>e.pct>0); }
    function getDominantBrushId(chart, hand) { const entries=chart[hand]; if(!entries||entries.length===0) return BUILTIN_FOLD_ID; const n=normalizeChartEntry(entries); if(n.length===0) return BUILTIN_FOLD_ID; let best=n[0]; for(const e of n) if(e.pct>best.pct) best=e; return best.brushId; }
    function getBrushIdsFromRange(range) { if(!range||!range.chart) return new Set([BUILTIN_FOLD_ID]); const s=new Set(); for(const entries of Object.values(range.chart)) for(const e of entries) if(e.brushId) s.add(e.brushId); if(s.size===0) s.add(BUILTIN_FOLD_ID); return s; }
    function getMixedPatternsFromRange(range) { const patterns = []; if (!range || !range.chart) return patterns; const seen = new Set(); for (const hand of Object.keys(range.chart)) { const entries = normalizeChartEntry(range.chart[hand]); if (entries.length > 1) { const key = entries.map(e => `${e.brushId}:${e.pct}`).join(','); if (!seen.has(key)) { seen.add(key); patterns.push({ entries, key }); } } } return patterns; }

    function buildGrid() { const c=document.getElementById('grid-main'); c.innerHTML=''; cellElements.clear(); for(let r=0;r<13;r++) { const row=document.createElement('div'); row.className='grid-row-cells'; for(let col=0;col<13;col++) { const hand=getHandName(r,col); const cell=document.createElement('div'); cell.className='cell'; cell.dataset.hand=hand; cell.dataset.row=r; cell.dataset.col=col; const label=document.createElement('div'); label.className='cell-label'; label.textContent=hand; cell.appendChild(label); cell.addEventListener('mousedown',onCellMouseDown); cell.addEventListener('mouseenter',onCellMouseEnter); row.appendChild(cell); cellElements.set(hand,cell); } c.appendChild(row); } }
    function updateCellDisplay(cell, hand, chart, train, hideTrainMarks=false) { cell.querySelectorAll('.stripe').forEach(s=>s.remove()); cell.querySelectorAll('.badge').forEach(b=>b.remove()); let label=cell.querySelector('.cell-label'); if(!label) { label=document.createElement('div'); label.className='cell-label'; label.textContent=hand; cell.appendChild(label); } cell.classList.remove('train-marked'); if(!hideTrainMarks&&train&&train[hand]===true) cell.classList.add('train-marked'); const entries=chart&&chart[hand]?normalizeChartEntry([...chart[hand]]):[]; if(entries.length===0) { const s=document.createElement('div'); s.className='stripe'; s.style.height='100%'; s.style.backgroundColor=DEFAULT_FOLD_COLOR; cell.appendChild(s); } else { let cum=0; for(const e of entries) { const brush=getBrushById(e.brushId); const color=brush?brush.color:DEFAULT_FOLD_COLOR; const s=document.createElement('div'); s.className='stripe'; s.style.height=e.pct+'%'; s.style.backgroundColor=color; cell.appendChild(s); cum+=e.pct; } if(cum<100) { const s=document.createElement('div'); s.className='stripe'; s.style.height=(100-cum)+'%'; s.style.backgroundColor=DEFAULT_FOLD_COLOR; cell.appendChild(s); } } if(cell.querySelector('.cell-label')) cell.appendChild(cell.querySelector('.cell-label')); }
    function updateCellsForRange(rangeId, hideTrainMarks=false) { const range=rangeId?findItemInTreeById(state.tree,rangeId):null; const chart=range&&range.type==='range'?range.chart:{}; const train=range&&range.type==='range'?range.train:{}; for(const [hand,cell] of cellElements) updateCellDisplay(cell,hand,chart,train,hideTrainMarks); }
    function clearAllCellHighlights() { for(const cell of cellElements.values()) cell.classList.remove('active-train-hand','memory-correct','memory-wrong'); }
    function clearInlineCellBorders() { for(const cell of cellElements.values()) cell.style.borderColor=''; }
    function highlightCellInTrain(hand) { clearAllCellHighlights(); const cell=cellElements.get(hand); if(cell) cell.classList.add('active-train-hand'); }
    function setAllCellsNeutral() { for(const [hand,cell] of cellElements) { cell.querySelectorAll('.stripe').forEach(s=>s.remove()); cell.classList.remove('train-marked','memory-correct','memory-wrong'); let label=cell.querySelector('.cell-label'); if(!label) { label=document.createElement('div'); label.className='cell-label'; label.textContent=hand; cell.appendChild(label); } const s=document.createElement('div'); s.className='stripe'; s.style.height='100%'; s.style.backgroundColor='#2a2d35'; cell.appendChild(s); if(cell.querySelector('.cell-label')) cell.appendChild(cell.querySelector('.cell-label')); } }

    function onCellMouseDown(e) { const hand=e.currentTarget.dataset.hand; if(!hand) return; if(state.mode==='train') { if(e.shiftKey) toggleTrainMark(hand); return; } if(state.mode==='memory') { state.isDrawing=true; state.isShiftDrawing=false; applyMemoryBrush(hand); return; } if(state.mode==='editor') { if(e.shiftKey) { state.isDrawing=true; state.isShiftDrawing=true; toggleTrainMark(hand); } else { state.isDrawing=true; state.isShiftDrawing=false; applyBrushReplace(hand); } } }
    function onCellMouseEnter(e) { if(!state.isDrawing) return; const hand=e.currentTarget.dataset.hand; if(!hand) return; if(state.mode==='editor') { state.isShiftDrawing?toggleTrainMark(hand):applyBrushReplace(hand); } else if(state.mode==='memory') { applyMemoryBrush(hand); } }
    function onGlobalMouseUp() { state.isDrawing=false; state.isShiftDrawing=false; }
    function toggleTrainMark(hand) { const range=getActiveRange(); if(!range||range.type!=='range') return; if(!range.train) range.train={}; range.train[hand]=!range.train[hand]; saveData(); updateCellDisplay(cellElements.get(hand),hand,range.chart,range.train); }
    function applyBrushReplace(hand) { const range=getActiveRange(); if(!range||range.type!=='range') return; if(!range.chart) range.chart={}; const selected=[...state.selectedBrushes]; if(selected.length===0) selected.push(BUILTIN_FOLD_ID); const pctEach=Math.floor(100/selected.length); const rem=100-pctEach*selected.length; const entries=selected.map((id,i)=>({brushId:id,pct:pctEach+(i===0?rem:0)})); range.chart[hand]=entries; saveData(); updateCellDisplay(cellElements.get(hand),hand,range.chart,range.train); }
    function applyMemoryBrush(hand) { const brushId=state.memoryState.selectedMemBrushId; if(getBrushById(brushId)) state.memoryState.userChart[hand]=brushId; state.memoryState.checked=false; renderMemoryCell(hand); }
    function renderMemoryCell(hand) { const cell=cellElements.get(hand); if(!cell) return; const brushId=state.memoryState.userChart[hand]; const brush=getBrushById(brushId); const color=brush?brush.color:'#2a2d35'; cell.querySelectorAll('.stripe').forEach(s=>s.remove()); cell.querySelectorAll('.badge').forEach(b=>b.remove()); cell.classList.remove('train-marked','memory-correct','memory-wrong'); let label=cell.querySelector('.cell-label'); if(!label) { label=document.createElement('div'); label.className='cell-label'; label.textContent=hand; cell.appendChild(label); } const s=document.createElement('div'); s.className='stripe'; s.style.height='100%'; s.style.backgroundColor=color; cell.appendChild(s); if(cell.querySelector('.cell-label')) cell.appendChild(cell.querySelector('.cell-label')); }

    function renderBrushes() { const c=document.getElementById('brush-list'); c.innerHTML=''; for(const brush of state.brushes) { const chip=document.createElement('span'); chip.className='brush-chip'; if(state.selectedBrushes.has(brush.id)) chip.classList.add('selected'); chip.dataset.brushId=brush.id; const sw=document.createElement('span'); sw.className='swatch'; sw.style.backgroundColor=brush.color; chip.appendChild(sw); const n=document.createElement('span'); n.textContent=brush.name; chip.appendChild(n); if(!brush.builtin) { const d=document.createElement('span'); d.className='del-brush'; d.textContent='×'; d.addEventListener('click',e=>{e.stopPropagation();deleteBrush(brush.id);}); chip.appendChild(d); } chip.addEventListener('click',e=>{ if(e.ctrlKey||e.metaKey) { state.selectedBrushes.has(brush.id)?state.selectedBrushes.delete(brush.id):state.selectedBrushes.add(brush.id); } else { state.selectedBrushes.clear(); state.selectedBrushes.add(brush.id); } if(state.selectedBrushes.size===0) state.selectedBrushes.add(BUILTIN_FOLD_ID); renderBrushes(); }); c.appendChild(chip); } }
    function showAddBrushForm() { document.getElementById('add-brush-form').classList.remove('hidden'); document.getElementById('brush-name-input').value=document.getElementById('brush-type-select').value; document.getElementById('brush-color-input').value='#6366f1'; updateColorPaletteHighlight('#6366f1'); }
    function hideAddBrushForm() { document.getElementById('add-brush-form').classList.add('hidden'); }
    function deleteBrush(id) { if(id===BUILTIN_FOLD_ID) return; state.brushes=state.brushes.filter(b=>b.id!==id); state.selectedBrushes.delete(id); if(state.selectedBrushes.size===0) state.selectedBrushes.add(BUILTIN_FOLD_ID); for(const range of getAllRangesFromTree(state.tree)) { if(!range.chart) continue; for(const hand of Object.keys(range.chart)) { range.chart[hand]=range.chart[hand].filter(e=>e.brushId!==id); if(range.chart[hand].length===0) delete range.chart[hand]; } } saveData(); renderBrushes(); updateCellsForRange(state.activeRangeId); }
    function updateColorPaletteHighlight(color) { document.querySelectorAll('#color-palette .color-dot').forEach(d=>d.classList.remove('active-dot')); for(const d of document.querySelectorAll('#color-palette .color-dot')) { if(d.dataset.color===color) { d.classList.add('active-dot'); break; } } }

    function renderTree() { const c=document.getElementById('tree-container'); if(c) { c.innerHTML=''; renderTreeItems(state.tree,c,0,true); } }
    function renderMemoryTree() { const c=document.getElementById('memory-tree-container'); if(!c) return; c.innerHTML=''; renderTreeItems(state.tree,c,0,false); }
    function renderTreeItems(items, container, depth, isEditor) { for(const item of items) { const div=document.createElement('div'); div.className='tree-item'; if(isEditor) { div.draggable=true; div.dataset.treeId=item.id; } div.style.paddingLeft=(depth*14+6)+'px'; if(state.activeTreeElementId===item.id&&isEditor) div.classList.add('active-tree'); if(item.type==='range'&&state.activeRangeId===item.id&&(!isEditor||state.activeTreeElementId!==item.id)) div.classList.add('active-tree'); const icon=document.createElement('span'); icon.className='tree-icon'; icon.textContent=item.type==='folder'?(item.expanded?'📂':'📁'):'📄'; div.appendChild(icon); if(item.type==='folder'&&isEditor) { const cb=document.createElement('input'); cb.type='checkbox'; cb.className='tree-checkbox'; const st=getFolderCheckboxState(item); cb.checked=st.checked; cb.indeterminate=st.indeterminate; cb.addEventListener('click',e=>{e.stopPropagation(); setTrainEnabledForFolder(item,cb.checked); saveData(); renderTree();}); div.appendChild(cb); } const nameSpan=document.createElement('span'); nameSpan.className='tree-name'; nameSpan.textContent=item.name; div.appendChild(nameSpan); if(item.type==='range') { if(isEditor) { const cb=document.createElement('input'); cb.type='checkbox'; cb.className='tree-checkbox'; cb.checked=item.trainEnabled!==false; cb.addEventListener('click',e=>{e.stopPropagation(); item.trainEnabled=!item.trainEnabled; saveData(); renderTree();}); div.appendChild(cb); const sb=document.createElement('span'); sb.className='scenario-btn'; sb.textContent='⚙️'; sb.addEventListener('click',e=>{e.stopPropagation(); openScenarioModal(item);}); div.appendChild(sb); } } if(isEditor) { const actions=document.createElement('span'); actions.className='tree-actions'; const copyBtn=document.createElement('button'); copyBtn.textContent='📋'; copyBtn.addEventListener('click',e=>{e.stopPropagation(); if(item.type==='range') copyRange(item.id);}); actions.appendChild(copyBtn); const delBtn=document.createElement('button'); delBtn.textContent='×'; delBtn.style.fontSize='15px'; delBtn.style.fontWeight='700'; delBtn.addEventListener('click',async e=>{e.stopPropagation(); await deleteTreeItem(item.id);}); actions.appendChild(delBtn); div.appendChild(actions); } div.addEventListener('click',e=>{ if(e.target.tagName==='INPUT'||e.target.closest('button')||e.target.closest('.scenario-btn')) return; if(isEditor) state.activeTreeElementId=item.id; if(item.type==='range') { state.activeRangeId=item.id; if(state.mode==='memory') { document.getElementById('memory-current-range').textContent=item.name; updateMemoryBrushButtons(item); state.memoryState.userChart={}; state.memoryState.checked=false; setAllCellsNeutral(); document.getElementById('memory-result').textContent=''; } if(isEditor) updateCellsForRange(item.id); } if(item.type==='folder') { item.expanded=!item.expanded; saveData(); } if(isEditor) renderTree(); else renderMemoryTree(); }); if(isEditor) { div.addEventListener('dblclick',e=>{ if(e.target.tagName==='INPUT'||e.target.closest('button')||e.target.closest('.scenario-btn')) return; startRename(item); }); div.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',JSON.stringify({id:item.id}));}); div.addEventListener('dragover',e=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; const rect=div.getBoundingClientRect(); const y=e.clientY-rect.top; const h=rect.height; let pos; if(y<h*0.25) pos='before'; else if(y>h*0.75) pos='after'; else pos='inside'; div.dataset.dropPosition=pos; document.querySelectorAll('.tree-item.drop-before, .tree-item.drop-after, .tree-item.drop-inside').forEach(el=>el.classList.remove('drop-before','drop-after','drop-inside')); div.classList.add('drop-'+pos); }); div.addEventListener('dragleave',()=>{ div.classList.remove('drop-before','drop-after','drop-inside'); delete div.dataset.dropPosition; }); div.addEventListener('drop',e=>{ e.preventDefault(); div.classList.remove('drop-before','drop-after','drop-inside'); const data=JSON.parse(e.dataTransfer.getData('text/plain')); const pos=div.dataset.dropPosition||'after'; if(data.id&&data.id!==item.id) { handleTreeDrop(data.id,item.id,pos); } delete div.dataset.dropPosition; }); } container.appendChild(div); if(item.type==='folder'&&item.expanded&&item.children) renderTreeItems(item.children,container,depth+1,isEditor); } }
    function handleTreeDrop(dragId, targetId, position) { const dragItem=findItemInTreeById(state.tree,dragId); if(!dragItem) return; const targetItem=findItemInTreeById(state.tree,targetId); if(!targetItem||dragId===targetId) return; if(position==='inside'&&targetItem.type==='folder'&&findItemInTreeById([targetItem],dragId)) return; removeItemFromTree(state.tree,dragId); const parentInfo=findParentInTree(state.tree,targetId); const parentArray=parentInfo?parentInfo.array:state.tree; const targetIndex=parentArray.indexOf(targetItem); if(position==='inside'&&targetItem.type==='folder') { if(!targetItem.children) targetItem.children=[]; targetItem.children.push(dragItem); targetItem.expanded=true; } else if(position==='before') { parentArray.splice(targetIndex,0,dragItem); } else { parentArray.splice(targetIndex+1,0,dragItem); } saveData(); renderTree(); }
    function startRename(item) { const el=document.querySelector(`[data-tree-id="${item.id}"]`); if(!el) return; const nameSpan=el.querySelector('.tree-name'); if(!nameSpan) return; const input=document.createElement('input'); input.value=item.name; nameSpan.innerHTML=''; nameSpan.appendChild(input); input.focus(); input.select(); const finish=(save)=>{ const newName=save?input.value.trim():item.name; if(save&&newName&&newName!==item.name) { item.name=newName; saveData(); } renderTree(); }; input.addEventListener('blur',()=>finish(true)); input.addEventListener('keydown',e=>{if(e.key==='Enter') finish(true); if(e.key==='Escape') finish(false);}); }
    function copyRange(id) { const range=findItemInTreeById(state.tree,id); if(!range||range.type!=='range') return; const copy=deepClone(range); copy.id=genId(); copy.name+=' (копия)'; insertAfterInTree(state.tree,id,copy); saveData(); renderTree(); }
    async function deleteTreeItem(id) { const ok = await customConfirm('Удалить этот элемент?'); if(!ok) return; removeItemFromTree(state.tree,id); if(state.activeRangeId===id) state.activeRangeId=null; if(state.activeTreeElementId===id) state.activeTreeElementId=null; saveData(); renderTree(); updateCellsForRange(state.activeRangeId); }
    function addFolder() { const f={id:genId(),type:'folder',name:'Новая папка',expanded:true,children:[]}; state.tree.push(f); state.activeTreeElementId=f.id; saveData(); renderTree(); }
    function addRange() { const r={id:genId(),type:'range',name:'Новый диапазон',trainEnabled:true,chart:{},train:{},scenario:{position:'BTN',players:6,effectiveStack:100,actionBefore:'none',raiseSize:2.5}}; state.tree.push(r); state.activeTreeElementId=r.id; state.activeRangeId=r.id; saveData(); renderTree(); updateCellsForRange(r.id); }

    function openScenarioModal(item) { scenarioEditingRangeId=item.id; document.getElementById('scenario-modal').classList.remove('hidden'); const sc=item.scenario||{position:'BTN',players:6,effectiveStack:100,actionBefore:'none',raiseSize:2.5}; document.getElementById('scenario-position').value=sc.position||'BTN'; document.getElementById('scenario-players').value=sc.players||6; document.getElementById('scenario-stack').value=sc.effectiveStack||100; document.getElementById('scenario-action').value=sc.actionBefore||'none'; document.getElementById('scenario-raise-size').value=sc.raiseSize||2.5; toggleRaiseSizeInput(); }
    function closeScenarioModal() { document.getElementById('scenario-modal').classList.add('hidden'); scenarioEditingRangeId=null; }
    function toggleRaiseSizeInput() { document.getElementById('scenario-raise-size-container').style.display=['raise','3bet','allin','limp'].includes(document.getElementById('scenario-action').value)?'block':'none'; }

    function handleTrainingAnswer(answerBrushId) {
        if (state.mode !== 'train' || state.trainState.answered) return;
        if (!state.trainState.currentHand || !state.trainState.currentRangeId) return;
        state.trainState.answered = true;
        const range = findItemInTreeById(state.tree, state.trainState.currentRangeId);
        const chart = (range && range.type === 'range') ? range.chart : {};
        const handEntries = chart && chart[state.trainState.currentHand] ? normalizeChartEntry([...chart[state.trainState.currentHand]]) : [];
        const correctBrushIds = new Set(handEntries.map(e => e.brushId));
        if (correctBrushIds.size === 0) correctBrushIds.add(BUILTIN_FOLD_ID);
        let isCorrect;
        if (handEntries.length > 1) {
            const currentKey = handEntries.map(e => `${e.brushId}:${e.pct}`).join(',');
            const clickedBtn = document.querySelector(`#train-answers .answer-btn[data-brush-id="${answerBrushId}"]`);
            const clickedKey = clickedBtn ? clickedBtn.dataset.patternKey : null;
            isCorrect = (clickedKey === currentKey);
        } else {
            isCorrect = correctBrushIds.has(answerBrushId);
        }
        const answerBrush = (answerBrushId && answerBrushId.startsWith('mixture_')) ? null : (getBrushById(answerBrushId) || getBrushById(BUILTIN_FOLD_ID));
        if (isCorrect) {
            state.trainCounts.correct++;
        } else {
            state.trainCounts.wrong++;
        }
        document.getElementById('train-correct-count').textContent = state.trainCounts.correct;
        document.getElementById('train-wrong-count').textContent = state.trainCounts.wrong;
        const fb = document.getElementById('train-feedback');
        fb.textContent = isCorrect ? '✅ Верно!' : '❌ Неверно';
        fb.className = isCorrect ? 'correct' : 'wrong';
        document.querySelectorAll('#train-answers .answer-btn').forEach(b => {
            b.style.pointerEvents = 'none';
            b.style.opacity = '0.7';
            const bid = b.dataset.brushId;
            if (bid === answerBrushId) {
                b.classList.add(isCorrect ? 'correct-flash' : 'wrong-flash');
            }
            if (correctBrushIds.has(bid) && !isCorrect && handEntries.length === 1) b.classList.add('correct-flash');
            if (handEntries.length > 1) {
                const currentKey = handEntries.map(e => `${e.brushId}:${e.pct}`).join(',');
                if (b.dataset.patternKey === currentKey && !isCorrect) b.classList.add('correct-flash');
            }
        });
        state.statistics.train.push({
            hand: state.trainState.currentHand,
            answer: answerBrush ? answerBrush.type : 'mixture',
            correct: isCorrect,
            correctType: '',
            timestamp: Date.now(),
            rangeId: state.trainState.currentRangeId
        });
        saveData();
        const delay = isCorrect ? 500 : 1800;
        state.trainState.timeoutId = setTimeout(() => {
            state.trainState.timeoutId = null;
            if (state.mode === 'train') startTraining();
        }, delay);
    }

            const data = await response.json();
            if (data.version !== DATA_VERSION) {
                alert('Неверная версия данных в файле автоимпорта. Ожидается версия ' + DATA_VERSION);
                return;
            }
            state.brushes = data.brushes || [];
            state.tree = data.tree || [];
            state.statistics = { train: [], memory: [] };
            state.trainCounts = { correct: 0, wrong: 0 };
            state.memoryCounts = { correct: 0, wrong: 0 };
            state.selectedBrushes = new Set([BUILTIN_FOLD_ID]);
            state.activeRangeId = null;
            state.activeTreeElementId = null;
            ensureBuiltinFold();
            saveData();
            fullRender();
            setMode('editor');
        } catch (e) {
            console.log('Автозагрузка диапазонов не выполнена: ' + e.message);
        }
    }

    async function init() {
        const loaded = loadData();
        if (!loaded) {
            state.brushes = [];
            state.tree = [];
            state.statistics = { train: [], memory: [] };
            state.selectedBrushes = new Set([BUILTIN_FOLD_ID]);
            state.trainCounts = { correct: 0, wrong: 0 };
            state.memoryCounts = { correct: 0, wrong: 0 };
        }
        ensureBuiltinFold();
        buildGrid();
        setMode('editor');
        fullRender();

        await autoLoadRanges();

        document.addEventListener('mouseup', onGlobalMouseUp);
        document.addEventListener('keydown', handleKeyDown);

        document.querySelectorAll('.mode-tab').forEach(tab => tab.addEventListener('click', () => {
            const mode = tab.dataset.mode;
            setMode(mode);
            if (mode === 'train') startTraining();
        }));

        document.getElementById('btn-add-brush').addEventListener('click', showAddBrushForm);
        document.getElementById('btn-cancel-brush').addEventListener('click', hideAddBrushForm);
        document.getElementById('btn-save-brush').addEventListener('click', () => {
            const type = document.getElementById('brush-type-select').value;
            const name = document.getElementById('brush-name-input').value.trim() || type;
            const color = document.getElementById('brush-color-input').value;
            state.brushes.push({ id: genId(), type, name, color, builtin: false });
            state.selectedBrushes.clear();
            state.selectedBrushes.add(state.brushes[state.brushes.length - 1].id);
            saveData();
            hideAddBrushForm();
            renderBrushes();
        });
        document.getElementById('brush-type-select').addEventListener('change', function () {
            document.getElementById('brush-name-input').value = this.value;
        });

        const palette = document.getElementById('color-palette');
        POPULAR_COLORS.forEach(color => {
            const dot = document.createElement('span');
            dot.className = 'color-dot';
            dot.style.backgroundColor = color;
            dot.dataset.color = color;
            dot.addEventListener('click', () => {
                document.getElementById('brush-color-input').value = color;
                updateColorPaletteHighlight(color);
            });
            palette.appendChild(dot);
        });
        document.getElementById('brush-color-input').addEventListener('input', function () {
            updateColorPaletteHighlight(this.value);
        });

        document.getElementById('btn-add-folder').addEventListener('click', addFolder);
        document.getElementById('btn-add-range').addEventListener('click', addRange);

        document.getElementById('scenario-action').addEventListener('change', toggleRaiseSizeInput);
        document.getElementById('btn-scenario-save').addEventListener('click', saveScenario);
        document.getElementById('btn-scenario-cancel').addEventListener('click', closeScenarioModal);
        document.getElementById('scenario-modal').addEventListener('click', function (e) {
            if (e.target === this) closeScenarioModal();
        });

        document.getElementById('btn-toggle-grid-train').addEventListener('click', () => {
            state.trainState.showGrid = !state.trainState.showGrid;
            const gw = document.getElementById('grid-wrapper');
            if (state.trainState.showGrid) {
                gw.classList.remove('invisible');
                if (state.trainState.currentRangeId) {
                    updateCellsForRange(state.trainState.currentRangeId);
                    if (state.trainState.currentHand) highlightCellInTrain(state.trainState.currentHand);
                }
            } else gw.classList.add('invisible');
        });

        document.getElementById('btn-check-memory').addEventListener('click', checkMemory);

        document.getElementById('btn-toggle-grid-memory').addEventListener('click', () => {
            state.memoryState.showGrid = !state.memoryState.showGrid;
            const gw = document.getElementById('grid-wrapper');
            const ar = getActiveRange();
            if (state.memoryState.showGrid) {
                gw.classList.remove('invisible');
                if (ar && ar.type === 'range') updateCellsForRange(ar.id, true);
                for (const hand of Object.keys(state.memoryState.userChart)) renderMemoryCell(hand);
            } else {
                gw.classList.add('invisible');
                setAllCellsNeutral();
                for (const hand of Object.keys(state.memoryState.userChart)) renderMemoryCell(hand);
            }
        });

        document.getElementById('report-mode-select').addEventListener('change', () => {
            renderReportTree();
            renderReport();
        });

        document.getElementById('btn-reset-stats').addEventListener('click', resetStatistics);

        document.getElementById('btn-reset-timer').addEventListener('click', resetTimer);

        document.getElementById('btn-export').addEventListener('click', () => {
            const data = { version: DATA_VERSION, brushes: state.brushes, tree: state.tree, statistics: state.statistics };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'preflop_trainer_v4_' + new Date().toISOString().slice(0, 10) + '.json';
            a.click();
            URL.revokeObjectURL(url);
        });

        document.getElementById('btn-import').addEventListener('click', () => document.getElementById('import-file').click());
        document.getElementById('import-file').addEventListener('change', async function () {
            if (this.files && this.files[0]) {
                const reader = new FileReader();
                reader.onload = async function (e) {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (data.version !== DATA_VERSION) {
                            alert('Неверная версия данных. Ожидается версия ' + DATA_VERSION);
                            return;
                        }
                        const ok = await customConfirm('Заменить все текущие данные импортированными? Это нельзя отменить.');
                        if (!ok) return;
                        state.brushes = data.brushes || [];
                        state.tree = data.tree || [];
                        state.statistics = data.statistics || { train: [], memory: [] };
                        state.trainCounts = { correct: 0, wrong: 0 };
                        state.memoryCounts = { correct: 0, wrong: 0 };
                        state.selectedBrushes = new Set([BUILTIN_FOLD_ID]);
                        state.activeRangeId = null;
                        state.activeTreeElementId = null;
                        ensureBuiltinFold();
                        saveData();
                        setMode('editor');
                        fullRender();
                    } catch (err) {
                        alert('Ошибка при чтении файла: ' + err.message);
                    }
                };
                reader.readAsText(this.files[0]);
                this.value = '';
            }
        });

        if (state.mode === 'train') startTraining();
    }

    function fullRender() {
        renderBrushes();
        renderTree();
        updateCellsForRange(state.activeRangeId);
        document.getElementById('train-correct-count').textContent = state.trainCounts.correct;
        document.getElementById('train-wrong-count').textContent = state.trainCounts.wrong;
        document.getElementById('memory-correct-count').textContent = state.memoryCounts.correct;
        document.getElementById('memory-wrong-count').textContent = state.memoryCounts.wrong;
        document.getElementById('timer-display').textContent = '00:00';
    }

    init();
})();
</script>
</body>
</html>
